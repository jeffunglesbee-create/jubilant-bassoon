name = "field-betfair-relay"
main = "src/index.js"
compatibility_date = "2026-05-21"

# DEPLOY — manual only (no auto-deploy workflow; consistent with field-claude-proxy)
#
# Step 1 — Set secrets (BEFORE deploying — worker is useless without them):
#   cd workers/field-betfair-relay
#   npx wrangler secret put BETFAIR_APP_KEY    ← delayed free key from Developer Portal
#   npx wrangler secret put BETFAIR_USERNAME   ← Betfair account email
#   npx wrangler secret put BETFAIR_PASSWORD   ← Betfair account password
#
# Step 2 — Deploy:
#   cd workers/field-betfair-relay
#   npx wrangler deploy
#
# Step 3 — Verify:
#   curl https://field-betfair-relay.jeffunglesbee.workers.dev/betfair/health
#   Expected: {"ok":true,"sessionValid":true,...}
#
# Secrets persist across deploys — deploying new code does NOT clear them.
# To update a secret: npx wrangler secret put BETFAIR_APP_KEY --name field-betfair-relay
#
# Live key upgrade (£299 one-time, when approved):
#   npx wrangler secret put BETFAIR_APP_KEY --name field-betfair-relay
#   (paste the live key; no code changes needed — worker handles both key types)
#
# Why no auto-deploy workflow?
#   CLOUDFLARE_API_TOKEN is not a stored GitHub secret in jubilant-bassoon.
#   The main site deploys via Cloudflare's connected-repo CI — no token needed.
#   Worker deploys require wrangler auth, which Jeff runs locally.
#   This is identical to how field-claude-proxy is deployed.
