# Secrets are set in Cloudflare dashboard — NOT here.
# Dashboard: Workers & Pages → field-claude-proxy → Settings → Variables and Secrets
#   GEMINI_KEY    → Google AI Studio key (aistudio.google.com → Get API key)
#   ANTHROPIC_KEY → Anthropic key (optional Claude fallback)
#
# Secrets persist across wrangler deploys — deploying new code does NOT clear them.
# To update secrets: wrangler secret put GEMINI_KEY --name field-claude-proxy

