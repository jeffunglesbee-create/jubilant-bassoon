name: MLB Player Mismatch Detector

# Manually-triggered ONLY — periodically-useful audit tool, not a
# continuous pipeline. Promote to scheduled later if the candidates list
# proves consistently non-empty in practice. Finds real, evidence-based
# candidates for CANONICAL_PLAYER (field-relay-nba/src/identity-resolver.js)
# by cross-referencing Savant-sourced last-name keys against ESPN roster
# data — this script PROPOSES candidates, it does not decide; review
# outbox/mlb-player-mismatches.json manually before adding anything to
# CANONICAL_PLAYER.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Detect player name mismatches
        run: node scripts/mlb-player-mismatch-detector.js
      - name: Commit outbox/mlb-player-mismatches.json
        run: |
          git config user.email "mlb-stats@field"
          git config user.name "MLB-Stats-Bot"
          git add outbox/mlb-player-mismatches.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "data: player mismatch detector run [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
