name: Odds API Probe

on:
  workflow_dispatch:
  push:
    paths:
      - 'outbox/.trigger-odds-probe'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    name: Probe The Odds API via relay

    steps:
      - uses: actions/checkout@v4

      - name: Run probe
        run: |
          TS=$(date -u '+%Y%m%dT%H%M%SZ')
          mkdir -p outbox/odds
          echo "FIELD Odds API Probe -- $TS" > outbox/odds/probe-${TS}.txt
          python3 scripts/odds_probe.py >> outbox/odds/probe-${TS}.txt 2>&1
          echo "TS=${TS}" >> "$GITHUB_ENV"

      - name: Commit results
        if: always()
        env:
          TS: ${{ env.TS }}
        run: |
          git config user.name  "FIELD Probe"
          git config user.email "probe@field.app"
          git add outbox/odds/ || true
          git diff --staged --quiet && echo "nothing to commit" || \
            git commit -m "probe: odds-api ${TS} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main && break
            sleep $((i * 5))
          done
