# .github/workflows/oura-fetch.yml
#
# OURA HEALTH DATA FETCH
# Calls Oura API v2 from CI (unrestricted network — no sandbox limits).
# Stores OURA_TOKEN in repo Actions secrets.
#
# Trigger file: outbox/.trigger-oura
# Optional format:
#   days=14           ← number of days to fetch (default: 7)
#
# Result: written to outbox/oura-data.json (stable filename)
# Read via: raw.githubusercontent.com/jeffunglesbee-create/jubilant-bassoon/main/outbox/oura-data.json
#
# Endpoints fetched:
#   daily_readiness, daily_sleep, daily_spo2, daily_activity,
#   daily_stress, heartrate, personal_info
#
# Result commits use [skip ci] to suppress downstream CI workflows.

name: Oura Health Data Fetch

on:
  push:
    paths:
      - 'outbox/.trigger-oura'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch (default: 7)'
        default: '7'
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Oura health data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
          DAYS_INPUT: ${{ github.event.inputs.days }}
        run: |
          if [ -z "$OURA_TOKEN" ]; then
            echo '{"error":"OURA_TOKEN not set in repo secrets — add via Settings > Secrets > Actions"}' \
              > outbox/oura-data.json
            echo "ERROR: OURA_TOKEN secret not configured"
            exit 0
          fi

          # Resolve days from input, trigger file, or default 7
          DAYS="${DAYS_INPUT:-7}"
          if [ -f outbox/.trigger-oura ]; then
            TF_DAYS=$(grep '^days=' outbox/.trigger-oura 2>/dev/null | cut -d= -f2- | tr -d '[:space:]')
            [ -n "$TF_DAYS" ] && DAYS="$TF_DAYS"
          fi

          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d "${DAYS} days ago" +%Y-%m-%d)
          START_DT="${START}T00:00:00Z"
          END_DT="${END}T23:59:59Z"

          echo "Fetching $DAYS days of Oura data: $START → $END"
          echo "START=$START" >> $GITHUB_ENV
          echo "END=$END"     >> $GITHUB_ENV
          echo "DAYS=$DAYS"   >> $GITHUB_ENV

          AUTH="Authorization: Bearer $OURA_TOKEN"
          BASE="https://api.ouraring.com/v2/usercollection"

          # Fetch each endpoint — failures write empty data array, never abort
          echo "→ daily_readiness"
          curl -sf -H "$AUTH" "$BASE/daily_readiness?start_date=$START&end_date=$END" \
            > /tmp/readiness.json || echo '{"data":[]}' > /tmp/readiness.json

          echo "→ daily_sleep"
          curl -sf -H "$AUTH" "$BASE/daily_sleep?start_date=$START&end_date=$END" \
            > /tmp/sleep.json || echo '{"data":[]}' > /tmp/sleep.json

          echo "→ daily_spo2"
          curl -sf -H "$AUTH" "$BASE/daily_spo2?start_date=$START&end_date=$END" \
            > /tmp/spo2.json || echo '{"data":[]}' > /tmp/spo2.json

          echo "→ daily_activity"
          curl -sf -H "$AUTH" "$BASE/daily_activity?start_date=$START&end_date=$END" \
            > /tmp/activity.json || echo '{"data":[]}' > /tmp/activity.json

          echo "→ daily_stress"
          curl -sf -H "$AUTH" "$BASE/daily_stress?start_date=$START&end_date=$END" \
            > /tmp/stress.json || echo '{"data":[]}' > /tmp/stress.json

          echo "→ heartrate"
          curl -sf -H "$AUTH" \
            "$BASE/heartrate?start_datetime=${START_DT}&end_datetime=${END_DT}" \
            > /tmp/heartrate.json || echo '{"data":[]}' > /tmp/heartrate.json

          echo "→ personal_info"
          curl -sf -H "$AUTH" "$BASE/personal_info" \
            > /tmp/personal_info.json || echo '{}' > /tmp/personal_info.json

          # Combine all endpoints into outbox/oura-data.json
          python3 - <<'PYEOF'
import json, os
from datetime import datetime, timezone

def load(path):
    try:
        with open(path) as f:
            return json.load(f)
    except Exception as e:
        return {"error": str(e)}

result = {
    "fetched_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
    "date_range": {
        "start": os.environ.get("START", ""),
        "end":   os.environ.get("END",   ""),
        "days":  int(os.environ.get("DAYS", 7))
    },
    "readiness":    load("/tmp/readiness.json"),
    "sleep":        load("/tmp/sleep.json"),
    "spo2":         load("/tmp/spo2.json"),
    "activity":     load("/tmp/activity.json"),
    "stress":       load("/tmp/stress.json"),
    "heartrate":    load("/tmp/heartrate.json"),
    "personal_info": load("/tmp/personal_info.json")
}

os.makedirs("outbox", exist_ok=True)
with open("outbox/oura-data.json", "w") as f:
    json.dump(result, f, indent=2)

total_bytes = len(json.dumps(result))
print(f"\n✓ Written {total_bytes:,} bytes to outbox/oura-data.json")
print(f"  date_range : {result['date_range']['start']} → {result['date_range']['end']}")
for key in ["readiness", "sleep", "spo2", "activity", "stress"]:
    items = result.get(key, {}).get("data", [])
    print(f"  {key:<12}: {len(items)} records")
heartrate_items = result.get("heartrate", {}).get("data", [])
print(f"  {'heartrate':<12}: {len(heartrate_items)} samples")
PYEOF

      - name: Commit and push result
        env:
          START: ${{ env.START }}
          END:   ${{ env.END }}
          DAYS:  ${{ env.DAYS }}
        run: |
          git config user.email "oura-fetch@field"
          git config user.name  "Oura-Fetch"
          git add outbox/oura-data.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "oura: ${DAYS}d data ${START}→${END} [skip ci]"
          # Retry push with rebase — handles concurrent CI commits
          for i in 1 2 3; do
            git pull --rebase --autostash origin main \
              && git push origin main \
              && echo "✓ Pushed" && break
            echo "Push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
