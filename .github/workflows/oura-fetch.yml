name: Oura Fetch
on:
  schedule:
    - cron: '0 9 * * *'
  push:
    paths:
      - 'outbox/.trigger-oura'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch'
        required: false
        default: '7'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          
          if [ -f outbox/.trigger-oura ]; then
            FILE_DAYS=$(grep -oP 'days=\K\d+' outbox/.trigger-oura 2>/dev/null || echo "")
            [ -n "$FILE_DAYS" ] && DAYS="$FILE_DAYS"
          fi
          
          START=$(date -d "-${DAYS} days" +%Y-%m-%d)
          END=$(date -d "+1 day" +%Y-%m-%d)
          echo "Fetching $DAYS days: $START to $END"
          mkdir -p outbox
          
          ENDPOINTS=(daily_readiness daily_sleep daily_spo2 daily_activity daily_stress heartrate personal_info)
          
          echo "{" > outbox/oura-data.json
          echo "  \"fetched_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> outbox/oura-data.json
          echo "  \"start_date\": \"$START\"," >> outbox/oura-data.json
          echo "  \"end_date\": \"$END\"," >> outbox/oura-data.json
          
          FIRST=true
          for EP in "${ENDPOINTS[@]}"; do
            if [ "$EP" = "personal_info" ]; then
              URL="https://api.ouraring.com/v2/usercollection/${EP}"
            else
              URL="https://api.ouraring.com/v2/usercollection/${EP}?start_date=${START}&end_date=${END}"
            fi
            RESPONSE=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer ${OURA_TOKEN}" "$URL")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> outbox/oura-data.json
            fi
            echo "  \"${EP}\": {\"status\": ${HTTP_CODE}, \"data\": ${BODY:-null}}" >> outbox/oura-data.json
            echo "  $EP: HTTP $HTTP_CODE"
          done
          echo "" >> outbox/oura-data.json
          echo "}" >> outbox/oura-data.json
          wc -c outbox/oura-data.json

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outbox/oura-data.json -f
          git commit -m "oura: fetch $(date +%Y-%m-%d) [skip ci]" || echo "Nothing to commit"
          git push || true
