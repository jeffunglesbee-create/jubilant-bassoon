# .github/workflows/field-autodeploy.yml
#
# FIELD FULL AUTOMATION — Google Drive → GitHub → Cloudflare
#
# HOW IT WORKS:
# 1. Claude saves index.html to a specific Google Drive file (public share link)
# 2. This Action polls that Drive link every 30 minutes
# 3. If the file has changed, it commits to main
# 4. Cloudflare Workers CI deploys automatically (~19s)
#
# ── SETUP (one time) ────────────────────────────────────────────────────────
#
# Step 1 — Share the Drive file publicly:
#   a. Find the index.html file in Drive
#   b. Right-click → Share → change to "Anyone with the link" → Viewer → Done
#   c. The share URL looks like:
#      https://drive.google.com/file/d/FILE_ID_HERE/view?usp=sharing
#   d. Extract just the FILE_ID (the part between /d/ and /view)
#
# Step 2 — Add GitHub Secret:
#   jubilant-bassoon → Settings → Secrets and variables → Actions →
#   New repository secret → Name: DRIVE_FILE_ID → Value: FILE_ID → Add secret
#
# Step 3 — Set write permissions (one time):
#   Settings → Actions → General → Workflow permissions →
#   "Read and write permissions" → Save
#
# ── SCHEDULE ────────────────────────────────────────────────────────────────
# Every 30 minutes automatically. Manual trigger always available.
# Common cron values:
#   Every 15 min: '*/15 * * * *'
#   Every 30 min: '*/30 * * * *'  ← current
#   Every hour:   '0 * * * *'
#   Every 6 hours: '0 */6 * * *'
#
# ── CHANGE LOG ───────────────────────────────────────────────────────────────
# v4 (May 15 2026): Fixed merge conflict on concurrent pushes.
#   Root cause: v3 committed THEN rebased. When both sides changed index.html
#   the rebase hit a content conflict it couldn't auto-resolve.
#   Fix: fetch + reset to remote HEAD *before* committing. Our commit always
#   starts from the latest remote state — no rebase needed, no conflicts.
#
# v3 (May 15 2026): Added git pull --rebase before push.
#   Fixed "rejected — fetch first" on non-fast-forward pushes.
#
# v2 (May 14 2026): Added permissions block + improved error messages.
#
# v1 (May 14 2026): Initial version.

name: FIELD Auto-Deploy

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Manual trigger from Actions tab or GitHub mobile app
  push:
    paths:
      - 'outbox/.trigger-autodeploy'   # Push this file to fire immediately

# Required: write permission for git push
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Check Drive for updates and deploy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download index.html from Google Drive
        run: |
          # SKIP HELPER: copies current index.html → index_new.html so cmp sees
          # "no change" and all downstream steps are cleanly bypassed.
          skip() { cp index.html index_new.html; echo "⏭  $1"; exit 0; }

          FILE_ID="${{ secrets.DRIVE_FILE_ID }}"
          if [ -z "$FILE_ID" ]; then
            skip "DRIVE_FILE_ID not configured — Drive auto-deploy disabled (git push is canonical deploy path)"
          fi
          echo "Downloading from Drive (file ID: ${FILE_ID:0:8}...)"
          URL="https://drive.google.com/uc?export=download&id=$FILE_ID"
          if ! curl --fail -L --max-time 30 -o index_new.html "$URL"; then
            skip "Drive download failed — skipping (transient error or file not shared). URL: $URL"
          fi
          SIZE=$(wc -c < index_new.html)
          echo "Downloaded: ${SIZE} bytes"
          if [ "$SIZE" -lt 100000 ]; then
            skip "File too small (${SIZE} bytes) — Drive returned a confirmation or error page"
          fi
          if ! grep -q '<title>FIELD' index_new.html; then
            skip "Downloaded file is not the FIELD app — Drive returned an interstitial page"
          fi
          if ! grep -q 'buildTodaySchedule' index_new.html; then
            skip "Downloaded file is not the FIELD app — missing core function (wrong file in Drive?)"
          fi
          if ! grep -q 'renderAll' index_new.html; then
            skip "Downloaded file is not the FIELD app — missing renderAll function"
          fi
          echo "✓ Download OK (${SIZE} bytes)"

      - name: Check if file changed
        id: diff
        run: |
          if cmp -s index.html index_new.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No change detected — skipping deploy"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            OLD_SIZE=$(wc -c < index.html)
            NEW_SIZE=$(wc -c < index_new.html)
            DELTA=$((NEW_SIZE - OLD_SIZE))
            echo "Change detected: ${OLD_SIZE} → ${NEW_SIZE} bytes (+${DELTA})"
          fi

      - name: Validate new file before committing
        if: steps.diff.outputs.changed == 'true'
        id: validate
        run: |
          # ── Basic structure ──────────────────────────────────────────────
          grep -q '<title>FIELD' index_new.html        || { echo "❌ Title missing"; exit 1; }
          grep -q 'buildTodaySchedule' index_new.html  || { echo "❌ Schedule function missing"; exit 1; }
          grep -q 'renderAll' index_new.html           || { echo "❌ Render function missing"; exit 1; }
          grep -q '</html>' index_new.html             || { echo "❌ File appears truncated"; exit 1; }

          # ── Size guard — full FIELD app must be >500KB ───────────────────
          SIZE=$(wc -c < index_new.html)
          if [ "$SIZE" -lt 500000 ]; then
            echo "❌ Drive file too small (${SIZE} bytes, need >500KB) — degraded export rejected"
            echo "   Upload a complete index.html to Drive before auto-deploy will accept it."
            exit 1
          fi

          # ── Critical function presence (guards against stripped exports) ─
          MISSING=""
          grep -q 'MLB_STATS_BASE'     index_new.html || MISSING="$MISSING MLB_STATS_BASE"
          grep -q 'RELAY_BASE'         index_new.html || MISSING="$MISSING RELAY_BASE"
          grep -q 'SPORT_CHIP_LABELS'  index_new.html || MISSING="$MISSING SPORT_CHIP_LABELS"
          grep -q 'BRIEF_LEAGUES'      index_new.html || MISSING="$MISSING BRIEF_LEAGUES"
          grep -q 'pruneOldFieldData'  index_new.html || MISSING="$MISSING pruneOldFieldData"
          grep -q 'RELAY_CUTOVER_DATE' index_new.html || MISSING="$MISSING RELAY_CUTOVER_DATE"
          if [ -n "$MISSING" ]; then
            echo "❌ Drive file missing critical functions:$MISSING"
            echo "   This is a degraded export that would break the live app. Commit blocked."
            exit 1
          fi

          # ── Version guard — skip if Drive file is older than current repo ─
          # SW_VERSION format: 'YYYYMMDD-N'. Lexicographic compare is safe.
          DRIVE_VER=$(grep -oP "const SW_VERSION = '\K[^']+" index_new.html 2>/dev/null || echo "00000000-0")
          REPO_VER=$(grep -oP "const SW_VERSION\s+=\s+'\K[^']+" index.html 2>/dev/null || echo "00000000-0")
          if [[ "$DRIVE_VER" < "$REPO_VER" ]]; then
            echo "⏭  Drive SW_VERSION ($DRIVE_VER) < repo ($REPO_VER) — Drive is stale, skipping commit"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

          echo "✓ Validation passed — ${SIZE} bytes, no missing functions, SW_VERSION=$DRIVE_VER"

      - name: Replace and commit
        if: steps.diff.outputs.changed == 'true' && steps.validate.outputs.skip != 'true'
        run: |
          git config user.name "FIELD Auto-Deploy"
          git config user.email "action@github.com"
          # KEY FIX (v4): Fetch + reset to latest remote state BEFORE committing.
          # This means our commit always starts from remote HEAD — no rebase
          # needed and no content conflicts possible even if a manual push
          # happened between our checkout and this step.
          git fetch origin main
          git reset --hard origin/main
          # Apply the Drive version on top of the fresh remote state
          mv index_new.html index.html
          git add index.html
          # Only commit if index.html actually differs from the reset state
          if git diff --cached --quiet; then
            echo "✓ Drive file matches remote after fetch — no commit needed"
          else
            # Sync SW_VERSION in sw.js to match index.html (Rule 23 + PWA-A fix)
            # sw.js hardcodes SW_VERSION — must match index.html daily for cache busting
            INDEX_VER=$(grep -oP "const SW_VERSION\s+=\s+'\K[^']+" index.html 2>/dev/null || echo "")
            SW_VER=$(grep -oP "const SW_VERSION\s+=\s+'\K[^']+" sw.js 2>/dev/null || echo "")
            if [ -n "$INDEX_VER" ] && [ "$INDEX_VER" != "$SW_VER" ]; then
              sed -i "s/const SW_VERSION  = '[^']*'/const SW_VERSION  = '${INDEX_VER}'/" sw.js
              git add sw.js
              echo "✅ SW_VERSION synced: ${SW_VER} → ${INDEX_VER}"
            else
              echo "✅ SW_VERSION already current (${SW_VER})"
            fi
            git commit -m "Auto-deploy from Drive $(date '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✓ Committed and pushed — Cloudflare deploying in ~19s"
          fi

      - name: No update needed
        if: steps.diff.outputs.changed == 'false'
        run: echo "✓ index.html unchanged — no deploy needed"
