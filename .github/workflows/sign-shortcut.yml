name: Sign Apple Shortcut
on:
  push:
    paths:
      - 'outbox/.trigger-sign-shortcut'
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose and sign
        run: |
          set -x
          sw_vers
          which shortcuts
          shortcuts help 2>&1 || true
          shortcuts sign --help 2>&1 || true
          
          INPUT="scripts/Oura_SPO2_Guarded.unsigned.plist"
          OUTPUT="outbox/Oura_SPO2_Guarded.shortcut"
          DIAG="outbox/sign-diagnostic.txt"
          mkdir -p outbox
          
          echo "=== ATTEMPT 1: shortcuts sign ===" | tee "$DIAG"
          shortcuts sign \
            --input "$INPUT" \
            --output "$OUTPUT" \
            --mode anyone 2>&1 | tee -a "$DIAG"
          SIGN_EXIT=$?
          echo "EXIT CODE: $SIGN_EXIT" | tee -a "$DIAG"
          
          if [ $SIGN_EXIT -ne 0 ] || [ ! -f "$OUTPUT" ]; then
            echo "=== SIGN FAILED — trying plutil ===" | tee -a "$DIAG"
            plutil -convert binary1 -o "$OUTPUT" "$INPUT" 2>&1 | tee -a "$DIAG"
            echo "FALLBACK: plutil binary conversion (NOT signed)" >> "$DIAG"
          else
            echo "SIGN SUCCEEDED" >> "$DIAG"
            file "$OUTPUT" >> "$DIAG"
            xxd "$OUTPUT" | head -5 >> "$DIAG"
          fi
          
          ls -la "$OUTPUT" >> "$DIAG" 2>&1

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outbox/ -f
          git commit -m "sign shortcut diagnostic [skip ci]" || echo "Nothing to commit"
          git push || true
