name: Whoop Fetch
on:
  push:
    paths:
      - 'outbox/.trigger-whoop'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch'
        required: false
        default: '7'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install pynacl requests -q

      - name: Fetch Whoop data
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, base64, requests
          from datetime import datetime, timedelta
          from nacl import encoding, public

          client_id = os.environ["WHOOP_CLIENT_ID"]
          client_secret = os.environ["WHOOP_CLIENT_SECRET"]
          refresh_token = os.environ.get("WHOOP_REFRESH_TOKEN", "")
          days = int("${{ github.event.inputs.days || '7' }}")
          pat = "${{ secrets.GITHUB_TOKEN }}"
          repo = "${{ github.repository }}"

          result = {"fetched_at": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "days": days}
          os.makedirs("outbox", exist_ok=True)

          if not refresh_token:
              result["error"] = "No WHOOP_REFRESH_TOKEN. Run whoop-auth-exchange first."
              with open("outbox/whoop-data.json", "w") as f:
                  json.dump(result, f, indent=2)
              print("ERROR: No refresh token")
              exit(0)

          # Refresh access token
          print("Refreshing access token...")
          r = requests.post("https://api.prod.whoop.com/oauth/oauth2/token", data={
              "grant_type": "refresh_token",
              "refresh_token": refresh_token,
              "client_id": client_id,
              "client_secret": client_secret
          })

          if r.status_code != 200:
              result["error"] = f"Token refresh failed: {r.status_code} - {r.text}"
              with open("outbox/whoop-data.json", "w") as f:
                  json.dump(result, f, indent=2)
              print(f"ERROR: {r.text}")
              exit(0)

          tokens = r.json()
          access_token = tokens["access_token"]
          new_refresh = tokens.get("refresh_token", refresh_token)
          print(f"Token refreshed (expires in {tokens.get('expires_in','?')}s)")

          # Update refresh token secret (rolling refresh)
          headers_gh = {"Authorization": f"token {pat}", "Accept": "application/vnd.github+json"}
          pk_r = requests.get(f"https://api.github.com/repos/{repo}/actions/secrets/public-key", headers=headers_gh)
          pk_data = pk_r.json()
          pub_key = public.PublicKey(pk_data["key"].encode("utf-8"), encoding.Base64Encoder)
          sealed = public.SealedBox(pub_key)
          enc = base64.b64encode(sealed.encrypt(new_refresh.encode())).decode()
          requests.put(
              f"https://api.github.com/repos/{repo}/actions/secrets/WHOOP_REFRESH_TOKEN",
              headers=headers_gh,
              json={"encrypted_value": enc, "key_id": pk_data["key_id"]}
          )
          print("Refresh token updated")

          # Fetch data
          headers = {"Authorization": f"Bearer {access_token}"}
          start = (datetime.utcnow() - timedelta(days=days)).strftime("%Y-%m-%dT00:00:00.000Z")
          end = datetime.utcnow().strftime("%Y-%m-%dT23:59:59.999Z")
          params = f"start={start}&end={end}&limit=50"
          base = "https://api.prod.whoop.com/developer/v1"

          endpoints = {
              "recovery": f"{base}/recovery?{params}",
              "cycle": f"{base}/cycle?{params}",
              "sleep": f"{base}/activity/sleep?{params}",
              "workout": f"{base}/activity/workout?{params}",
              "body": f"{base}/user/measurement/body",
              "profile": f"{base}/user/profile/basic",
          }

          for name, url in endpoints.items():
              print(f"Fetching {name}...")
              try:
                  r = requests.get(url, headers=headers)
                  result[name] = {"status": r.status_code, "data": r.json() if r.status_code == 200 else r.text[:500]}
              except Exception as e:
                  result[name] = {"status": 0, "error": str(e)}

          with open("outbox/whoop-data.json", "w") as f:
              json.dump(result, f, indent=2)

          print("\n=== Summary ===")
          for k, v in result.items():
              if isinstance(v, dict) and "status" in v:
                  d = v.get("data", {})
                  count = len(d.get("records", [])) if isinstance(d, dict) and "records" in d else "obj"
                  print(f"  {k:15s} HTTP {v['status']}  records: {count}")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outbox/whoop-data.json -f
          git commit -m "whoop: fetch $(date +%Y-%m-%d) [skip ci]" || echo "Nothing to commit"
          git push || true
