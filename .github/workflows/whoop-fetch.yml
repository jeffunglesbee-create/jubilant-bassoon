# .github/workflows/whoop-fetch.yml
#
# WHOOP HEALTH DATA FETCH (with auto token refresh)
# Fetches recovery, sleep, cycles, and workout data from the Whoop API.
# Auto-refreshes the access token using the stored refresh token.
# Updates WHOOP_REFRESH_TOKEN secret after each run (rolling refresh).
#
# Prerequisites: Run whoop-auth-exchange.yml first to set up tokens.
#
# Required secrets:
#   WHOOP_CLIENT_ID      — from developer-dashboard.whoop.com
#   WHOOP_CLIENT_SECRET  — from developer-dashboard.whoop.com
#   WHOOP_REFRESH_TOKEN  — set by whoop-auth-exchange.yml, auto-updated here
#
# Trigger file: outbox/.trigger-whoop
# Optional format:
#   days=14    ← days of history to fetch (default: 7)
#
# Result: outbox/whoop-data.json (stable filename)
# Read via: raw.githubusercontent.com/jeffunglesbee-create/jubilant-bassoon/main/outbox/whoop-data.json
#
# Key data returned:
#   recovery:  recovery_score (0-100%), hrv_rmssd_milli, resting_heart_rate,
#              spo2_percentage, skin_temp_celsius
#   sleep:     performance %, efficiency %, light/deep/REM durations,
#              disturbance_count, respiratory_rate, sleep_cycle_count
#   cycles:    day strain, average HR, kilojoules, max HR
#   workouts:  strain, HR zones, distance, sport name

name: Whoop Health Data Fetch

on:
  push:
    paths:
      - 'outbox/.trigger-whoop'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to fetch (default: 7)'
        default: '7'
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Refresh access token
        id: token
        env:
          WHOOP_CLIENT_ID:     ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: |
          if [ -z "$WHOOP_CLIENT_ID" ] || [ -z "$WHOOP_REFRESH_TOKEN" ]; then
            echo '{"error":"WHOOP secrets not configured — run whoop-auth-exchange.yml first"}' \
              > outbox/whoop-data.json
            echo "ERROR: Secrets not configured"
            exit 0
          fi

          echo "Refreshing Whoop access token..."
          RESPONSE=$(curl -sf -X POST \
            "https://api.prod.whoop.com/oauth/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${WHOOP_REFRESH_TOKEN}" \
            -d "client_id=${WHOOP_CLIENT_ID}" \
            -d "client_secret=${WHOOP_CLIENT_SECRET}" \
            -d "scope=offline read:recovery read:sleep read:cycles read:profile read:body_measurement" \
            2>&1)

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)
          NEW_REFRESH=$(echo  "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('refresh_token',''))" 2>/dev/null)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Token refresh failed. Response: $RESPONSE"
            echo '{"error":"Token refresh failed — re-run whoop-auth-exchange.yml"}' > outbox/whoop-data.json
            exit 0
          fi

          echo "✓ Access token refreshed"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
          echo "NEW_REFRESH=$NEW_REFRESH"   >> $GITHUB_ENV

      - name: Fetch Whoop health data
        env:
          DAYS_INPUT: ${{ github.event.inputs.days }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Skipping fetch — no access token"
            exit 0
          fi

          # Resolve days
          DAYS="${DAYS_INPUT:-7}"
          if [ -f outbox/.trigger-whoop ]; then
            TF_DAYS=$(grep '^days=' outbox/.trigger-whoop 2>/dev/null | cut -d= -f2- | tr -d '[:space:]')
            [ -n "$TF_DAYS" ] && DAYS="$TF_DAYS"
          fi

          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          START=$(date -u -d "${DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)

          echo "Fetching ${DAYS} days: $START → $END"
          echo "DAYS=$DAYS"  >> $GITHUB_ENV
          echo "START=$START" >> $GITHUB_ENV
          echo "END=$END"     >> $GITHUB_ENV

          AUTH="Authorization: Bearer $ACCESS_TOKEN"
          BASE="https://api.prod.whoop.com/developer"

          # Recovery (includes HRV, RHR, SpO2, skin temp) — paginate up to 25
          echo "→ recovery"
          curl -sf -H "$AUTH" \
            "$BASE/v2/recovery?start=${START}&end=${END}&limit=25" \
            > /tmp/recovery.json || echo '{"records":[]}' > /tmp/recovery.json

          # Sleep collection (stages, performance, disturbances)
          echo "→ sleep"
          curl -sf -H "$AUTH" \
            "$BASE/v2/activity/sleep?start=${START}&end=${END}&limit=25" \
            > /tmp/sleep.json || echo '{"records":[]}' > /tmp/sleep.json

          # Cycles (day strain, HR)
          echo "→ cycles"
          curl -sf -H "$AUTH" \
            "$BASE/v2/cycle?start=${START}&end=${END}&limit=25" \
            > /tmp/cycles.json || echo '{"records":[]}' > /tmp/cycles.json

          # Workouts
          echo "→ workouts"
          curl -sf -H "$AUTH" \
            "$BASE/v2/activity/workout?start=${START}&end=${END}&limit=25" \
            > /tmp/workouts.json || echo '{"records":[]}' > /tmp/workouts.json

          # Profile
          echo "→ profile"
          curl -sf -H "$AUTH" "$BASE/v2/user/profile/basic" \
            > /tmp/profile.json || echo '{}' > /tmp/profile.json

          # Body measurements
          echo "→ body measurements"
          curl -sf -H "$AUTH" "$BASE/v2/user/measurement/body" \
            > /tmp/body.json || echo '{}' > /tmp/body.json

          # Combine
          python3 - <<'PYEOF'
import json, os
from datetime import datetime, timezone

def load(path):
    try:
        with open(path) as f:
            return json.load(f)
    except Exception as e:
        return {"error": str(e)}

recovery_data  = load("/tmp/recovery.json")
sleep_data     = load("/tmp/sleep.json")
cycles_data    = load("/tmp/cycles.json")
workouts_data  = load("/tmp/workouts.json")
profile_data   = load("/tmp/profile.json")
body_data      = load("/tmp/body.json")

# Extract latest recovery metrics for quick summary
latest_recovery = {}
records = recovery_data.get("records", [])
if records:
    latest = records[0]
    score = latest.get("score", {})
    latest_recovery = {
        "recovery_score":    score.get("recovery_score"),
        "hrv_rmssd_milli":   score.get("hrv_rmssd_milli"),
        "resting_heart_rate": score.get("resting_heart_rate"),
        "spo2_percentage":   score.get("spo2_percentage"),
        "skin_temp_celsius": score.get("skin_temp_celsius"),
        "date":              latest.get("created_at", "")[:10]
    }

result = {
    "fetched_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
    "date_range": {
        "start": os.environ.get("START", ""),
        "end":   os.environ.get("END",   ""),
        "days":  int(os.environ.get("DAYS", 7))
    },
    "latest_recovery": latest_recovery,
    "recovery":  recovery_data,
    "sleep":     sleep_data,
    "cycles":    cycles_data,
    "workouts":  workouts_data,
    "profile":   profile_data,
    "body":      body_data
}

os.makedirs("outbox", exist_ok=True)
with open("outbox/whoop-data.json", "w") as f:
    json.dump(result, f, indent=2)

total_bytes = len(json.dumps(result))
print(f"\n✓ Written {total_bytes:,} bytes to outbox/whoop-data.json")
print(f"  date_range : {result['date_range']['start'][:10]} → {result['date_range']['end'][:10]}")
for key, data in [("recovery", recovery_data), ("sleep", sleep_data),
                  ("cycles", cycles_data), ("workouts", workouts_data)]:
    count = len(data.get("records", []))
    print(f"  {key:<12}: {count} records")

if latest_recovery:
    print(f"\n  Latest recovery snapshot ({latest_recovery.get('date', '')}):")
    print(f"    Recovery score : {latest_recovery.get('recovery_score')}%")
    print(f"    HRV (RMSSD)    : {latest_recovery.get('hrv_rmssd_milli')} ms")
    print(f"    Resting HR     : {latest_recovery.get('resting_heart_rate')} bpm")
    print(f"    SpO2           : {latest_recovery.get('spo2_percentage')}%")
    print(f"    Skin temp      : {latest_recovery.get('skin_temp_celsius')} °C")
PYEOF

      - name: Update refresh token secret
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NEW_REFRESH" ]; then
            echo "No new refresh token — skipping secret update"
            exit 0
          fi

          echo "Updating WHOOP_REFRESH_TOKEN secret with new token..."
          pip install pynacl --break-system-packages -q

          python3 << PYEOF
import base64, json, urllib.request
from nacl import encoding, public

PAT  = "${GH_TOKEN}"
REPO = "jeffunglesbee-create/jubilant-bassoon"

req = urllib.request.Request(
    f"https://api.github.com/repos/{REPO}/actions/secrets/public-key",
    headers={"Authorization": f"Bearer {PAT}", "Accept": "application/vnd.github+json"}
)
with urllib.request.urlopen(req) as r:
    pk_data = json.load(r)
key_id  = pk_data["key_id"]
pub_key = pk_data["key"]

def encrypt(pub_key_b64, value):
    pk = public.PublicKey(base64.b64decode(pub_key_b64))
    return base64.b64encode(public.SealedBox(pk).encrypt(value.encode())).decode()

encrypted = encrypt(pub_key, "${NEW_REFRESH}")
payload   = json.dumps({"encrypted_value": encrypted, "key_id": key_id}).encode()

req = urllib.request.Request(
    f"https://api.github.com/repos/{REPO}/actions/secrets/WHOOP_REFRESH_TOKEN",
    data=payload, method="PUT",
    headers={"Authorization": f"Bearer {PAT}", "Content-Type": "application/json",
             "Accept": "application/vnd.github+json"}
)
with urllib.request.urlopen(req) as r:
    print(f"✓ WHOOP_REFRESH_TOKEN updated (HTTP {r.status})")
PYEOF

      - name: Commit and push result
        env:
          START: ${{ env.START }}
          END:   ${{ env.END }}
          DAYS:  ${{ env.DAYS }}
        run: |
          git config user.email "whoop-fetch@field"
          git config user.name  "Whoop-Fetch"
          git add outbox/whoop-data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "whoop: ${DAYS}d data ${START:0:10}→${END:0:10} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main \
              && git push origin main && break
            sleep $((i * 5))
          done
