name: WC Score Probe
# Diagnoses WC live-score rendering. Loads FIELD with FIELD_DEBUG=1,
# captures [WC-SCORE] console output + card DOM state, commits to outbox/.
# Trigger: workflow_dispatch OR push to outbox/.trigger-wc-score-probe

on:
  push:
    paths: ['outbox/.trigger-wc-score-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wc-score-probe:
    runs-on: ubuntu-latest
    name: WC live-score diagnostic
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run WC score probe
        run: node wc_score_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        run: |
          git config user.email "probe@field"
          git config user.name "WC Score Probe"
          git add outbox/wc-score-probe-*.png outbox/wc-score-probe-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "wc score probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
