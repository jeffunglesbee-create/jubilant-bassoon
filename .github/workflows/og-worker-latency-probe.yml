name: OG Worker Latency Probe
# Measures real request latency to a static asset (sw.js), N=20 samples,
# reporting min/max/median/mean. Run once BEFORE run_worker_first:true
# ships (baseline) and once AFTER (post-deploy), per
# CC-CMD-2026-07-04-og-worker-run-first-fix-v2 TASK 2. Same asset, same
# method, same N both times so the two runs are a fair comparison.

on:
  push:
    paths: ['outbox/.trigger-og-worker-latency-probe']
  workflow_dispatch:
    inputs:
      label:
        description: 'Label for this run (e.g. "before" or "after")'
        required: true
        default: 'unlabeled'

permissions:
  contents: write

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Measure latency (N=20) against /sw.js
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          LABEL="${{ github.event.inputs.label || 'unlabeled' }}"
          OUT="outbox/og-worker-latency-${LABEL}-${TS}.txt"
          URL="https://jubilant-bassoon.jeffunglesbee.workers.dev/sw.js"
          N=20

          echo "=== OG Worker Latency Probe [$TS] label=$LABEL ===" > "$OUT"
          echo "URL: $URL" >> "$OUT"
          echo "Samples: $N" >> "$OUT"
          echo "" >> "$OUT"

          > /tmp/times.txt
          for i in $(seq 1 $N); do
            t=$(curl -s -o /dev/null -w "%{time_total}" -H "Cache-Control: no-cache" "$URL?_cb=$i-$RANDOM")
            echo "$t" >> /tmp/times.txt
            echo "sample $i: ${t}s" >> "$OUT"
          done

          echo "" >> "$OUT"
          sort -n /tmp/times.txt > /tmp/times_sorted.txt
          N_LINES=$(wc -l < /tmp/times_sorted.txt)
          MIN=$(head -1 /tmp/times_sorted.txt)
          MAX=$(tail -1 /tmp/times_sorted.txt)
          MEAN=$(awk '{sum+=$1} END{printf "%.4f", sum/NR}' /tmp/times_sorted.txt)
          if [ $((N_LINES % 2)) -eq 0 ]; then
            MID1=$((N_LINES/2))
            MID2=$((N_LINES/2+1))
            MEDIAN=$(awk -v a=$MID1 -v b=$MID2 'NR==a{x=$1} NR==b{y=$1} END{printf "%.4f", (x+y)/2}' /tmp/times_sorted.txt)
          else
            MID=$(((N_LINES+1)/2))
            MEDIAN=$(awk -v m=$MID 'NR==m{printf "%.4f", $1}' /tmp/times_sorted.txt)
          fi
          echo "min:    ${MIN}s" >> "$OUT"
          echo "max:    ${MAX}s" >> "$OUT"
          echo "median: ${MEDIAN}s" >> "$OUT"
          echo "mean:   ${MEAN}s" >> "$OUT"
          echo "all sorted: $(tr '\n' ' ' < /tmp/times_sorted.txt)" >> "$OUT"

          cat "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "OG Worker Latency Probe"
          git add "$OUT" 2>/dev/null || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "og worker latency probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
        env:
          OUT: ${{ env.OUT }}
