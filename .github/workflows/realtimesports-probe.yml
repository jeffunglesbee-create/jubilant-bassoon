name: RealtimeSports API Probe

on:
  push:
    paths:
      - 'outbox/.trigger-realtimesports'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run probe (direct API call, no relay)
        env:
          REALTIMESPORTS_KEY: ${{ secrets.REALTIMESPORTS_KEY }}
        run: python3 scripts/rts-probe.py

      - name: Push result
        run: |
          git config user.email "rts-probe@field"
          git config user.name "RTS-Probe"
          git add outbox/rts-result-*.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "rts-probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
