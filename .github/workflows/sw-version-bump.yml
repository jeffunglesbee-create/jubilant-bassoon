# .github/workflows/sw-version-bump.yml
# SW VERSION DAILY BUMP - Rule 23 automation
#
# Runs at 4:05 UTC (midnight ET). Resets SW_VERSION to today-a.
# Does NOT use [skip ci] - smoke self-verifies A515 after bump.
# Rule 23: new day starts at suffix a. Manual bumps (b, c...) unaffected.

name: SW Version Daily Bump

on:
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    name: Bump SW_VERSION to today ET date

    steps:
      - uses: actions/checkout@v4

      - name: Bump SW_VERSION in index.html
        run: |
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          echo "Target: ${TODAY}a"
          sed -i "s/const SW_VERSION = '\([0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\)[a-z]'/const SW_VERSION = '${TODAY}a'/g" index.html
          grep "const SW_VERSION" index.html | head -1

      - name: Commit and push
        run: |
          git config user.email "sw-bump@field"
          git config user.name "SW-Bump"
          git diff --quiet index.html && echo "Already current" && exit 0
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          git add index.html
          git commit -m "chore: SW_VERSION ${TODAY}a (Rule 23)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done

      - name: Summary
        if: always()
        run: |
          echo "SW Version Bump - $(TZ=America/New_York date +%Y-%m-%d)a - $(date +%H:%M UTC)"
