name: SW Version Daily Bump

on:
  schedule:
    - cron: "5 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    name: Bump SW_VERSION to today ET date

    steps:
      - uses: actions/checkout@v4

      - name: Bump SW_VERSION in index.html and sw.js
        run: |
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          echo "Target: ${TODAY}a"

          # index.html: const SW_VERSION = '2026-06-22a';
          sed -i -E "s/const SW_VERSION[[:space:]]*= '[0-9-]*[a-z]'/const SW_VERSION = '${TODAY}a'/" index.html
          echo "index.html: $(grep "const SW_VERSION = " index.html | head -1 | xargs)"

          # sw.js: const SW_VERSION = '2026-06-22a';
          sed -i -E "s/const SW_VERSION[[:space:]]*= '[0-9-]*[a-z]'/const SW_VERSION = '${TODAY}a'/" sw.js
          echo "sw.js:      $(grep "const SW_VERSION" sw.js | head -1 | xargs)"

      - name: Verify both files actually updated
        run: |
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          grep -q "const SW_VERSION = '${TODAY}a'" index.html || { echo "::error::index.html SW_VERSION not updated"; exit 1; }
          grep -q "const SW_VERSION = '${TODAY}a'" sw.js || { echo "::error::sw.js SW_VERSION not updated"; exit 1; }

      - name: Commit and push
        run: |
          git config user.email "sw-bump@field"
          git config user.name "SW-Bump"
          git diff --quiet index.html sw.js && echo "Already current" && exit 0
          TODAY=$(TZ=America/New_York date +%Y-%m-%d)
          git add index.html sw.js
          git commit -m "chore: SW_VERSION ${TODAY}a — index.html + sw.js (Rule 23)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done

      - name: Summary
        if: always()
        run: echo "SW Version Bump - $(TZ=America/New_York date +%Y-%m-%d)a - $(date +%H:%M UTC)"
