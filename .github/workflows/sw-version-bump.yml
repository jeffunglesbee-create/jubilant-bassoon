# .github/workflows/sw-version-bump.yml
#
# SW VERSION DAILY BUMP — Rule 23 automation
#
# WHY THIS EXISTS:
#   const SW_VERSION = '2026-06-22a' is hardcoded in index.html.
#   Smoke A515 requires SW_VERSION to start with today's ET date.
#   Without this, A515 fails every morning until manually bumped.
#
# WHY NOT [skip ci]:
#   Smoke must self-verify A515. One CI run/day at midnight. Acceptable.
#
# Rule 23: new day resets to 'a'. Manual bumps during day still work.

name: SW Version Daily Bump

on:
  schedule:
    - cron: '5 4 * * *'  # 4:05 UTC = midnight ET (covers EST and EDT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    name: Bump SW_VERSION to today ET date

    steps:
      - uses: actions/checkout@v4

      - name: Bump SW_VERSION in index.html
        run: |
          TODAY=$(TZ='America/New_York' date +%Y-%m-%d)
          echo "Target: ${TODAY}a"

          python3 - << PYEOF
import re, sys
today = "$(TZ='America/New_York' date +%Y-%m-%d)"
with open('index.html', encoding='utf-8') as f:
    content = f.read()
pattern = r"(const SW_VERSION\s*=\s*['\"])\d{4}-\d{2}-\d{2}[a-z](['\"];)"
new_content, n = re.subn(pattern, rf"\g<1>{today}a\g<2>", content, count=1)
if n == 0:
    print("WARNING: SW_VERSION pattern not found")
    sys.exit(0)
if new_content == content:
    print(f"Already {today}a — no change")
    sys.exit(0)
with open('index.html', 'w', encoding='utf-8') as f:
    f.write(new_content)
print(f"Bumped to {today}a")
PYEOF

      - name: Commit and push
        run: |
          git config user.email "sw-bump@field"
          git config user.name "SW-Bump"
          git diff --quiet index.html && echo "No change needed" && exit 0
          TODAY=$(TZ='America/New_York' date +%Y-%m-%d)
          git add index.html
          git commit -m "chore: SW_VERSION ${TODAY}a — daily bump (Rule 23)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done

      - name: Summary
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "  SW Version Bump — $(TZ='America/New_York' date +%Y-%m-%d)a"
          echo "  $(date '+%Y-%m-%d %H:%M UTC')"
          echo "══════════════════════════════════════"
