# .github/workflows/android-chrome-poc.yml
name: Android Chrome POC

on: workflow_dispatch

jobs:
  android-chrome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run emulator test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -no-audio -no-boot-anim
          disable-animations: true
          script: |
            set -e
            echo "=== Device info ==="
            adb devices
            adb shell getprop ro.build.version.release
            echo ""
            echo "=== Check if Chrome exists ==="
            adb shell pm list packages | grep chrome || echo "No chrome package found"
            echo ""
            echo "=== Try opening URL ==="
            adb shell am start -a android.intent.action.VIEW -d "https://jubilant-bassoon.jeffunglesbee.workers.dev/?wpt" 2>&1 || echo "am start failed"
            sleep 20
            echo ""
            echo "=== Screenshot ==="
            mkdir -p outbox/android-poc
            adb exec-out screencap -p > outbox/android-poc/android.png || echo "screencap failed"
            ls -la outbox/android-poc/
            echo ""
            echo "=== Manifest ==="
            echo "android: $(adb shell getprop ro.build.version.release)" > outbox/android-poc/manifest.txt
            echo "timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> outbox/android-poc/manifest.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-chrome-poc
          path: outbox/android-poc/
