name: Patent PDF Probe
on:
  push:
    paths: ['outbox/trigger-patent-pdf.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poppler-utils
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: Fetch + extract
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/patent-result-${TS}.txt"
          {
            echo "== Patent PDF Probe ${TS} =="
            echo "Trigger:"
            cat outbox/trigger-patent-pdf.txt 2>/dev/null || echo "(missing)"
            echo "---"
            URL=$(grep -E '^pdf_url=' outbox/trigger-patent-pdf.txt 2>/dev/null | sed 's/^pdf_url=//')
            echo "Parsed URL: $URL"
            if [ -z "$URL" ]; then
              echo "ERROR: no pdf_url found in trigger"
              exit 0
            fi
            HC=$(curl -sL -o /tmp/p.pdf -w "%{http_code}" "$URL")
            SZ=$(wc -c < /tmp/p.pdf 2>/dev/null || echo 0)
            echo "Download HTTP=$HC size=$SZ"
            echo "First 8 bytes: $(head -c 8 /tmp/p.pdf | od -An -c | tr -s ' ')"
            if [ "$HC" = "200" ] && [ "$SZ" -gt 1000 ]; then
              pdftotext -layout /tmp/p.pdf /tmp/p.txt 2>&1
              echo "Text size: $(wc -c < /tmp/p.txt) bytes / $(wc -l < /tmp/p.txt) lines"
              echo "=== PDF TEXT BEGINS ==="
              cat /tmp/p.txt
              echo "=== PDF TEXT ENDS ==="
            else
              echo "Skipping pdftotext (bad PDF)"
            fi
          } > "$OUT" 2>&1
          echo "Output file: $OUT"
          ls -la outbox/patent-result-*.txt | tail -1

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add outbox/patent-result-*.txt
          git status --short
          git commit -m "patent probe [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
