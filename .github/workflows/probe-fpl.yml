name: Probe FPL API

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright deps
        run: npx playwright install-deps chromium 2>/dev/null || true

      - name: Probe pulse via Playwright browser interception
        run: |
          node - << 'PLAYWRIGHT_SCRIPT'
          const { chromium } = require('playwright');
          (async () => {
            const PULSE_ID = 125161;
            const browser = await chromium.launch({
              executablePath: process.env.PLAYWRIGHT_BROWSERS_PATH
                ? require('fs').readdirSync(process.env.PLAYWRIGHT_BROWSERS_PATH + '/chromium').map(d => `${process.env.PLAYWRIGHT_BROWSERS_PATH}/chromium/${d}/chrome-linux/chrome`).find(p => { try { require('fs').accessSync(p); return true; } catch { return false; } })
                : undefined,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const context = await browser.newContext();
            const captured = [];
            await context.route('**footballapi.pulse.football.co.uk/**', async route => {
              const req = route.request();
              console.log('INTERCEPTED REQUEST:', req.url());
              console.log('  headers:', JSON.stringify(req.headers(), null, 2));
              const resp = await route.fetch();
              const body = await resp.text();
              console.log('  response status:', resp.status());
              console.log('  response headers:', JSON.stringify(resp.headers(), null, 2));
              console.log('  body (first 3000):', body.slice(0, 3000));
              captured.push({ url: req.url(), status: resp.status(), body: body.slice(0, 500) });
              await route.fulfill({ response: resp });
            });
            const page = await context.newPage();
            // Load a PL match page that uses this pulse_id
            console.log('=== Loading PL match page ===');
            try {
              await page.goto(`https://www.premierleague.com/match/${PULSE_ID}`, { timeout: 20000, waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(5000);
            } catch (e) {
              console.log('page load error (expected):', e.message.slice(0, 200));
            }
            console.log('=== captured pulse calls:', captured.length, '===');
            captured.forEach(c => console.log(c.url, c.status, c.body.slice(0, 200)));

            // Also try direct curl-style fetch from within browser context
            console.log('=== Direct fetch from browser context ===');
            try {
              const result = await page.evaluate(async (pid) => {
                const r = await fetch(`https://footballapi.pulse.football.co.uk/football/fixtures/${pid}`, {
                  headers: { 'Origin': 'https://www.premierleague.com' }
                });
                return { status: r.status, body: await r.text() };
              }, PULSE_ID);
              console.log('fetch status:', result.status);
              console.log('fetch body (first 2000):', result.body.slice(0, 2000));
            } catch (e) {
              console.log('in-page fetch error:', e.message);
            }

            await browser.close();
          })().catch(e => { console.error('PLAYWRIGHT ERROR:', e.message); process.exit(0); });
          PLAYWRIGHT_SCRIPT

      - name: Probe pulse raw curl with verbose headers
        run: |
          PULSE_ID=125161
          echo "=== curl -v to see response code and headers ==="
          curl -v -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}" \
            -H "Origin: https://www.premierleague.com" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.premierleague.com/" \
            -H "sec-fetch-site: cross-site" \
            -H "sec-fetch-mode: cors" \
            -H "sec-fetch-dest: empty" \
            2>&1 | head -80

          echo ""
          echo "=== same with -L (follow redirects) ==="
          curl -L -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}" \
            -H "Origin: https://www.premierleague.com" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: application/json" | head -c 3000 || echo "FAILED"

          echo ""
          echo "=== textstream with full browser headers ==="
          curl -v -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}/textstream/EN" \
            -H "Origin: https://www.premierleague.com" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://www.premierleague.com/" \
            2>&1 | head -80

      - name: Bootstrap static
        run: |
          echo "=== /api/bootstrap-static/ top-level keys ==="
          curl -s "https://fantasy.premierleague.com/api/bootstrap-static/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('keys:', Object.keys(d));
            console.log('events[0]:', JSON.stringify(d.events?.[0], null, 2));
            console.log('element_types:', JSON.stringify(d.element_types, null, 2));
          "

      - name: Fixtures
        run: |
          echo "=== /api/fixtures/ sample ==="
          curl -s "https://fantasy.premierleague.com/api/fixtures/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const finished = d.filter(f => f.finished).slice(-2);
            console.log('total fixtures:', d.length);
            console.log('sample finished fixture keys:', Object.keys(finished[0] || {}));
            console.log('stats array sample:', JSON.stringify(finished[0]?.stats, null, 2));
            console.log('full fixture sample:', JSON.stringify(finished[0], null, 2));
          "

      - name: Current GW live
        run: |
          echo "=== /api/event/{current_gw}/live/ ==="
          GW=$(curl -s "https://fantasy.premierleague.com/api/bootstrap-static/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const cur = d.events?.find(e => e.is_current) || d.events?.find(e => e.is_previous);
            console.log(cur?.id || 38);
          ")
          echo "Gameweek: $GW"
          curl -s "https://fantasy.premierleague.com/api/event/${GW}/live/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const elements = d.elements || [];
            console.log('element count:', elements.length);
            const sample = elements.find(e => e.stats?.goals_scored > 0) || elements[0];
            console.log('sample element keys:', Object.keys(sample || {}));
            console.log('sample stats:', JSON.stringify(sample?.stats, null, 2));
            console.log('sample explain:', JSON.stringify(sample?.explain, null, 2));
          "

      - name: Fixture detail (last finished)
        run: |
          echo "=== /api/fixture/ detail — checking for timeline/events ==="
          FIXTURE_ID=$(curl -s "https://fantasy.premierleague.com/api/fixtures/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const f = d.filter(x => x.finished).slice(-1)[0];
            console.log(f.id);
          ")
          echo "Fixture ID: $FIXTURE_ID"
          curl -s "https://fantasy.premierleague.com/api/fixtures/?event=$(curl -s 'https://fantasy.premierleague.com/api/fixtures/' | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.filter(x=>x.finished).slice(-1)[0].event)")" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('fixture count in event:', d.length);
            console.log('full first fixture:', JSON.stringify(d[0], null, 2));
          "

      - name: Element summary (player history)
        run: |
          echo "=== /api/element-summary/{id}/ — player history ==="
          curl -s "https://fantasy.premierleague.com/api/element-summary/328/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            console.log('history[0]:', JSON.stringify(d.history?.[0], null, 2));
            console.log('history_past[0]:', JSON.stringify(d.history_past?.[0], null, 2));
          "
