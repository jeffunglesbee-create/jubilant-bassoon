name: Probe FPL API

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe pulse_id endpoints
        run: |
          PULSE_ID=125161
          echo "=== pulse base — /api/football/fixtures/${PULSE_ID} ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}" \
            -H "Origin: https://www.premierleague.com" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            console.log('full:', JSON.stringify(d, null, 2).slice(0, 4000));
          " 2>&1 || echo "FAILED: base fixture"

          echo ""
          echo "=== pulse events — /api/football/fixtures/${PULSE_ID}/textstream/EN ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}/textstream/EN" \
            -H "Origin: https://www.premierleague.com" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            const events = d.events || d.content || d.entries || d.items || [];
            console.log('event count:', Array.isArray(events) ? events.length : 'not array');
            console.log('first event:', JSON.stringify(events[0], null, 2));
            console.log('second event:', JSON.stringify(events[1], null, 2));
          " 2>&1 || echo "FAILED: textstream"

          echo ""
          echo "=== pulse stats — /api/football/fixtures/${PULSE_ID}/stats ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}/stats" \
            -H "Origin: https://www.premierleague.com" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            console.log('full:', JSON.stringify(d, null, 2).slice(0, 3000));
          " 2>&1 || echo "FAILED: stats"

          echo ""
          echo "=== pulse lineups — /api/football/fixtures/${PULSE_ID}/lineups ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}/lineups" \
            -H "Origin: https://www.premierleague.com" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            console.log('full:', JSON.stringify(d, null, 2).slice(0, 3000));
          " 2>&1 || echo "FAILED: lineups"

          echo ""
          echo "=== PL API direct — /football/fixtures/${PULSE_ID} ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}" \
            -H "Origin: https://www.premierleague.com" \
            -H "Referer: https://www.premierleague.com/" | node -e "
            const raw = require('fs').readFileSync('/dev/stdin','utf8');
            console.log('raw (first 2000):', raw.slice(0, 2000));
          " 2>&1 || echo "FAILED"

          echo ""
          echo "=== PL match facts — /api/football/fixtures/${PULSE_ID}/matchfacts ==="
          curl -s "https://footballapi.pulse.football.co.uk/football/fixtures/${PULSE_ID}/matchfacts" \
            -H "Origin: https://www.premierleague.com" | node -e "
            const raw = require('fs').readFileSync('/dev/stdin','utf8');
            console.log('raw (first 3000):', raw.slice(0, 3000));
          " 2>&1 || echo "FAILED: matchfacts"

      - name: Bootstrap static
        run: |
          echo "=== /api/bootstrap-static/ top-level keys ==="
          curl -s "https://fantasy.premierleague.com/api/bootstrap-static/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('keys:', Object.keys(d));
            console.log('events[0]:', JSON.stringify(d.events?.[0], null, 2));
            console.log('element_types:', JSON.stringify(d.element_types, null, 2));
          "

      - name: Fixtures
        run: |
          echo "=== /api/fixtures/ sample ==="
          curl -s "https://fantasy.premierleague.com/api/fixtures/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const finished = d.filter(f => f.finished).slice(-2);
            console.log('total fixtures:', d.length);
            console.log('sample finished fixture keys:', Object.keys(finished[0] || {}));
            console.log('stats array sample:', JSON.stringify(finished[0]?.stats, null, 2));
            console.log('full fixture sample:', JSON.stringify(finished[0], null, 2));
          "

      - name: Current GW live
        run: |
          echo "=== /api/event/{current_gw}/live/ ==="
          GW=$(curl -s "https://fantasy.premierleague.com/api/bootstrap-static/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const cur = d.events?.find(e => e.is_current) || d.events?.find(e => e.is_previous);
            console.log(cur?.id || 38);
          ")
          echo "Gameweek: $GW"
          curl -s "https://fantasy.premierleague.com/api/event/${GW}/live/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const elements = d.elements || [];
            console.log('element count:', elements.length);
            const sample = elements.find(e => e.stats?.goals_scored > 0) || elements[0];
            console.log('sample element keys:', Object.keys(sample || {}));
            console.log('sample stats:', JSON.stringify(sample?.stats, null, 2));
            console.log('sample explain:', JSON.stringify(sample?.explain, null, 2));
          "

      - name: Fixture detail (last finished)
        run: |
          echo "=== /api/fixture/ detail — checking for timeline/events ==="
          FIXTURE_ID=$(curl -s "https://fantasy.premierleague.com/api/fixtures/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const f = d.filter(x => x.finished).slice(-1)[0];
            console.log(f.id);
          ")
          echo "Fixture ID: $FIXTURE_ID"
          curl -s "https://fantasy.premierleague.com/api/fixtures/?event=$(curl -s 'https://fantasy.premierleague.com/api/fixtures/' | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.filter(x=>x.finished).slice(-1)[0].event)")" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('fixture count in event:', d.length);
            console.log('full first fixture:', JSON.stringify(d[0], null, 2));
          "

      - name: Element summary (player history)
        run: |
          echo "=== /api/element-summary/{id}/ — player history ==="
          curl -s "https://fantasy.premierleague.com/api/element-summary/328/" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log('top keys:', Object.keys(d));
            console.log('history[0]:', JSON.stringify(d.history?.[0], null, 2));
            console.log('history_past[0]:', JSON.stringify(d.history_past?.[0], null, 2));
          "
