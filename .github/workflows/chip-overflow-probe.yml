name: Chip Overflow Probe
# Verifies .stream-chip and .watch-now-btn never overflow their container.
# CC-CMD-2026-07-23-chip-overflow-containment TASK 2 live verification.
# Trigger: push to outbox/.trigger-chip-overflow-probe OR workflow_dispatch

on:
  push:
    paths: ['outbox/.trigger-chip-overflow-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run chip overflow probe
        run: node chip_overflow_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        if: always()
        run: |
          git config user.email "probe@field"
          git config user.name "Chip Overflow Probe"
          git add outbox/chip-overflow-probe-*.png outbox/chip-overflow-probe-manifest-*.json
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chip overflow probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
