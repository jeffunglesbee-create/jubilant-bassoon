name: Nav Mode Consolidate Verify Probe
# Live verification for CC-CMD-2026-07-05-nav-mode-consolidate: confirms the
# shared attachNavLinkOnce() helper survives simulated renderAll() poll
# cycles without accumulating listeners, and that pickem-mode/wc-mode/
# journalism-mode each have a genuinely working exit path at their intended
# viewport widths.

on:
  push:
    paths: ['outbox/.trigger-nav-mode-consolidate-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run nav mode consolidate verify probe
        run: node nav_mode_consolidate_verify_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        if: always()
        run: |
          git config user.email "probe@field"
          git config user.name "Nav Mode Consolidate Verify Probe"
          git add outbox/nav-mode-consolidate-probe-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "nav mode consolidate verify probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
