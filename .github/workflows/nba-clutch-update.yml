name: NBA Clutch Stats Update

on:
  schedule:
    # Every 3 days during NBA Finals window (June 1 - July 15)
    # After midnight ET so Finals game data is complete
    - cron: '0 6 */3 6,7 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NBA clutch stats and upload to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: b57e9af57ab46c52ca9215804e689c29
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 scripts/nba-clutch-update.py

      - name: Commit outbox fallback
        run: |
          git config user.email "nba-clutch@field"
          git config user.name "NBA-Clutch-Bot"
          git add outbox/nba/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "NBA clutch stats update $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
