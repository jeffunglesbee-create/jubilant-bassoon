name: Sort Order Verify Probe
# Live TASK 2 verification for CC-CMD-2026-07-04-circadian-card-sort-order:
# injects a synthetic circadian-tier change into the live app's real
# allData/renderAll() and confirms the card visibly reorders, composing
# safely with the Phase 1/2 DOM reconciliation. Commits result to outbox/.

on:
  push:
    paths: ['outbox/.trigger-sort-order-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run sort order verify probe
        run: node sort_order_verify_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        if: always()
        run: |
          git config user.email "probe@field"
          git config user.name "Sort Order Verify Probe"
          git add outbox/sort-order-probe-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "sort order verify probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
