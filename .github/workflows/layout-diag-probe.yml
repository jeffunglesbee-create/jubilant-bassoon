name: Layout Diagnostic Probe
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright
        run: npm install @playwright/test && npx playwright install chromium --with-deps
      - name: Run layout diagnostic
        run: node layout_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev
      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Layout Diag Probe"
          git add outbox/layout-diag-*.json
          git diff --cached --quiet && exit 0
          git commit -m "layout diag result [skip ci]"
          for i in 1 2 3; do git pull --rebase --autostash origin main && git push origin main && break; sleep $((i*5)); done
