# .github/workflows/daily-brief.yml
#
# FIELD DAILY BRIEF — Smart-timed morning email
#
# HOW IT WORKS:
#   1. Cron wakes at 9:30 UTC (5:30am ET) — before the 6:15am target
#   2. Fetches today's game schedule via the relay (GitHub Actions CAN reach
#      *.workers.dev; the sandbox restriction only applies to Claude bash_tool)
#   3. Finds the earliest game start time across NBA + NHL
#   4. Calculates: trigger = min(6:15am ET, earliest_game - 1hr)
#   5. Sleeps until trigger time (max ~45min — well within the 60min timeout)
#   6. Sends a rich HTML email via Resend with:
#      - The trigger phrase (paste into Claude, done)
#      - Today's NBA/NHL slate with times
#      - SW_VERSION health check
#      - Relay status
#
# MANUAL TRIGGER: Actions tab → FIELD Daily Brief → Run workflow
#
# NO NEW SECRETS NEEDED: RESEND_API_KEY already set.

name: FIELD Daily Brief

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch NBA + NHL schedules via relay
        id: schedules
        run: |
          RELAY="https://field-relay-nba.jeffunglesbee.workers.dev"

          NBA=$(curl -sf --max-time 10 \
            "$RELAY/nba/liveData/scoreboard/todaysScoreboard_00.json" || echo '{}')
          NHL=$(curl -sf --max-time 10 \
            "$RELAY/nhl/v1/scoreboard/now" || echo '{}')
          HEALTH=$(curl -sf --max-time 5 "$RELAY/health" || echo "UNREACHABLE")

          echo "$NBA" > /tmp/nba.json
          echo "$NHL" > /tmp/nhl.json

          NBA_COUNT=$(jq '.scoreboard.games | length' /tmp/nba.json 2>/dev/null || echo 0)
          NHL_COUNT=$(jq '(.games // []) | length' /tmp/nhl.json 2>/dev/null || echo 0)

          # Build NBA games JSON for the email script
          NBA_GAMES=$(jq -c '[.scoreboard.games[]? | {
            away: "\(.awayTeam.teamCity) \(.awayTeam.teamName)",
            home: "\(.homeTeam.teamCity) \(.homeTeam.teamName)",
            time: .gameStatusText
          }]' /tmp/nba.json 2>/dev/null || echo '[]')

          # Find earliest game UTC across both sports
          NBA_EARLIEST=$(jq -r '.scoreboard.games[]?.gameTimeUTC // empty' /tmp/nba.json | sort | head -1)
          NHL_EARLIEST=$(jq -r '.games[]?.startTimeUTC // empty' /tmp/nhl.json 2>/dev/null | sort | head -1)

          if [ -n "$NBA_EARLIEST" ] && [ -n "$NHL_EARLIEST" ]; then
            EARLIEST=$(printf "%s\n%s\n" "$NBA_EARLIEST" "$NHL_EARLIEST" | sort | head -1)
          elif [ -n "$NBA_EARLIEST" ]; then
            EARLIEST="$NBA_EARLIEST"
          else
            EARLIEST="${NHL_EARLIEST:-}"
          fi

          echo "nba_count=$NBA_COUNT" >> $GITHUB_OUTPUT
          echo "nhl_count=$NHL_COUNT" >> $GITHUB_OUTPUT
          echo "relay_status=$HEALTH" >> $GITHUB_OUTPUT
          echo "earliest=${EARLIEST:-none}" >> $GITHUB_OUTPUT
          echo "nba_games_json=$NBA_GAMES" >> $GITHUB_OUTPUT

      - name: Wait until trigger time
        id: timing
        run: |
          NOW=$(date -u +%s)
          # 6:15am EDT = 10:15 UTC (Apr-Nov). Change to 11:15 in winter (EST).
          SEND_BY=$(date -u -d "today 10:15" +%s)
          EARLIEST="${{ steps.schedules.outputs.earliest }}"
          REASON="6:15am ET target"

          if [ "$EARLIEST" != "none" ] && [ -n "$EARLIEST" ]; then
            H1=$(date -u -d "$EARLIEST - 1 hour" +%s 2>/dev/null || echo "")
            if [ -n "$H1" ] && [ "$H1" -lt "$SEND_BY" ] && [ "$H1" -gt "$NOW" ]; then
              SEND_BY=$H1
              REASON="H-1 before $EARLIEST"
            fi
          fi

          echo "send_reason=$REASON" >> $GITHUB_OUTPUT

          SLEEP=$((SEND_BY - NOW))
          if [ "$SLEEP" -gt 0 ] && [ "$SLEEP" -lt 3600 ]; then
            echo "Sleeping ${SLEEP}s — trigger: $REASON"
            sleep $SLEEP
          else
            echo "Sending now — $REASON"
          fi

      - name: Check SW_VERSION health
        id: sw
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          SW=$(grep -oP "SW_VERSION = '\K[0-9-]+" index.html | head -1 || echo "unknown")
          if [ "$SW" = "$TODAY" ]; then
            STATUS="✅ Current ($SW)"
          else
            STATUS="⚠️ STALE — code has $SW, today is $TODAY"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Build and send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIELD_EMAIL: jeffunglesbee@gmail.com
          TODAY: ${{ steps.sw.outputs.today }}
          DAY: ${{ steps.sw.outputs.today }}
          NBA_COUNT: ${{ steps.schedules.outputs.nba_count }}
          NHL_COUNT: ${{ steps.schedules.outputs.nhl_count }}
          SW_STATUS: ${{ steps.sw.outputs.status }}
          RELAY_STATUS: ${{ steps.schedules.outputs.relay_status }}
          EARLIEST_GAME: ${{ steps.schedules.outputs.earliest }}
          SEND_REASON: ${{ steps.timing.outputs.send_reason }}
          NBA_GAMES_JSON: ${{ steps.schedules.outputs.nba_games_json }}
        run: |
          DAY=$(date -u +"%A, %B %-d, %Y")
          export DAY
          node scripts/daily-brief.js
