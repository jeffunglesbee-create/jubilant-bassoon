name: Dropbox OAuth bootstrap (one-shot)

# ONE-SHOT BOOTSTRAP — delete this workflow file after first successful run.
# Pure-Python implementation to avoid YAML pipe / bash heredoc indentation
# pitfalls when emitting diagnostics from inline scripts.

on:
  workflow_dispatch:
    inputs:
      app_key:
        description: 'Dropbox App key'
        required: true
        type: string
      app_secret:
        description: 'Dropbox App secret'
        required: true
        type: string
      auth_code:
        description: 'Authorization code from OAuth consent'
        required: true
        type: string

permissions:
  actions: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests pynacl --quiet

      - name: Mask sensitive inputs
        env:
          APP_KEY: ${{ inputs.app_key }}
          APP_SECRET: ${{ inputs.app_secret }}
          AUTH_CODE: ${{ inputs.auth_code }}
        run: |
          echo "::add-mask::$APP_KEY"
          echo "::add-mask::$APP_SECRET"
          echo "::add-mask::$AUTH_CODE"

      - name: Bootstrap Dropbox OAuth + set GitHub secrets
        env:
          APP_KEY: ${{ inputs.app_key }}
          APP_SECRET: ${{ inputs.app_secret }}
          AUTH_CODE: ${{ inputs.auth_code }}
          BOOTSTRAP_PAT: ${{ secrets.BOOTSTRAP_PAT }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/dropbox_bootstrap.py

      - name: Commit diagnostic on failure
        if: failure()
        run: |
          if [ -f outbox/_dropbox_bootstrap_diag.log ]; then
            git config user.email "actions@github.com"
            git config user.name "dropbox-bootstrap"
            git add outbox/_dropbox_bootstrap_diag.log
            git commit -m "bootstrap: capture failure diagnostic [skip ci]" || true
            git push || true
          fi

      - name: Self-delete this workflow run on success
        if: success()
        env:
          BOOTSTRAP_PAT: ${{ secrets.BOOTSTRAP_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          sleep 5
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: token ${BOOTSTRAP_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}")
          echo "Delete returned HTTP ${STATUS}"
