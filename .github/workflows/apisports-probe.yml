name: api-sports.io Probe

on:
  workflow_dispatch:
  push:
    paths: ['outbox/.trigger-apisports-probe']

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    name: Probe api-sports.io via relay

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Network check
        run: |
          echo "=== Testing relay reachability ==="
          curl -v --max-time 10 "https://field-relay-nba.jeffunglesbee.workers.dev/health" 2>&1 || echo "RELAY UNREACHABLE"

      - name: Run probe
        run: python3 scripts/apisports-probe.py
        continue-on-error: true

      - name: Commit results
        if: always()
        run: |
          git config user.name  "FIELD Probe"
          git config user.email "probe@field.app"
          git add outbox/apisports/ 2>/dev/null || true
          git diff --staged --quiet && echo "No new results" || \
            git commit -m "probe: apisports $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main && break
            sleep $((i * 5))
          done
