name: api-sports.io Probe

on:
  workflow_dispatch:
  push:
    paths: ['outbox/.trigger-apisports-probe']

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    name: Probe api-sports.io via relay

    steps:
      - uses: actions/checkout@v4

      - name: Probe endpoints
        run: |
          RELAY="https://field-relay-nba.jeffunglesbee.workers.dev"
          TODAY=$(date -u '+%Y-%m-%d')
          TS=$(date -u '+%Y%m%dT%H%M%SZ')
          OUT="outbox/apisports/probe-${TS}.txt"
          mkdir -p outbox/apisports

          get() {
            curl -sf --max-time 15 \
              -H "User-Agent: FIELD-probe/1.0" \
              -H "Accept: application/json" \
              "$1" 2>/dev/null || echo '{"error":"fetch_failed"}'
          }

          {
            echo "FIELD api-sports.io PROBE -- $TODAY $TS"
            echo "Relay: $RELAY"

            echo ""
            echo "=== HEALTH"
            get "$RELAY/health"

            echo ""
            echo "=== MLB today ($TODAY)"
            get "$RELAY/apisports/baseball/games?league=1&season=2026&date=$TODAY" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== NBA today ($TODAY)"
            get "$RELAY/apisports/basketball/games?league=12&season=2025-2026&date=$TODAY" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== NHL today ($TODAY)"
            get "$RELAY/apisports/hockey/games?league=57&season=2025-2026&date=$TODAY" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== NBA stats/teams id=500121"
            get "$RELAY/apisports/basketball/games/statistics/teams?id=500121" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== NBA stats/players id=500121"
            get "$RELAY/apisports/basketball/games/statistics/players?id=500121" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== Baseball team season stats (team=35 TEX)"
            get "$RELAY/apisports/baseball/teams/statistics?league=1&season=2026&team=35" | jq '.' 2>/dev/null || echo "not JSON"

            echo ""
            echo "=== MLS today"
            MLS=$(get "$RELAY/apisports/football/fixtures?league=253&season=2026&date=$TODAY")
            echo "$MLS" | jq '.' 2>/dev/null || echo "not JSON"
            MLS_ID=$(echo "$MLS" | jq -r '.response[0].fixture.id // empty' 2>/dev/null || true)
            if [ -n "$MLS_ID" ]; then
              echo ""
              echo "=== MLS predictions fixture=$MLS_ID"
              get "$RELAY/apisports/football/predictions?fixture=$MLS_ID" | jq '.' 2>/dev/null || echo "not JSON"
            else
              echo "(no MLS fixture today)"
            fi

            echo ""
            echo "=== DONE $TS"
          } | tee "$OUT"

          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Commit results
        if: always()
        env:
          OUT: ${{ env.OUT }}
        run: |
          git config user.name  "FIELD Probe"
          git config user.email "probe@field.app"
          [ -n "$OUT" ] && git add "$OUT" 2>/dev/null || git add outbox/apisports/ 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "probe: apisports $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main && break
            sleep $((i * 5))
          done
