name: api-sports.io Probe

# RUWT step 1 — read actual API response shapes before building adapters.
# GitHub runner IPs reach *.workers.dev; sandbox cannot.
# Results committed to outbox/apisports/ for Claude to read.

on:
  workflow_dispatch:  # trigger manually from sandbox via GitHub API
  push:
    paths:
      - 'outbox/.trigger-apisports-probe'  # or write this file to auto-trigger

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    name: Probe api-sports.io via relay

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run probe
        run: python3 scripts/apisports-probe.py

      - name: Commit results
        run: |
          git config user.name  "FIELD Probe"
          git config user.email "probe@field.app"
          git add outbox/apisports/
          git diff --staged --quiet && echo "No new results" || \
            git commit -m "probe: apisports $(date -u '+%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 5))
          done
