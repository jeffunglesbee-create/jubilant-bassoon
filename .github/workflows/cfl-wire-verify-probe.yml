name: CFL Wire Verify Probe
# Live TASK 3 verification for CC-CMD-2026-07-04-cfl-live-scoreboard-wire:
# confirms the live CFL scoreboard fetch renders correctly on the
# deployed app (not the static fallback, and never both at once), and
# observes the real data-circadian value on a live CFL card.

on:
  push:
    paths: ['outbox/.trigger-cfl-wire-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run CFL wire verify probe
        run: node cfl_wire_verify_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        if: always()
        run: |
          git config user.email "probe@field"
          git config user.name "CFL Wire Verify Probe"
          git add outbox/cfl-wire-probe-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "cfl wire verify probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
