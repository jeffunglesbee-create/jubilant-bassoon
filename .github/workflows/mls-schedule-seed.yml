name: MLS Schedule Seed (one-time, post-WC)

on:
  workflow_dispatch:   # Manual trigger only — one-time seed

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MLS fixtures Jul 19–Oct 31 and insert into ARCHIVE_DB
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: b57e9af57ab46c52ca9215804e689c29
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 scripts/seed-mls-return-2026.py

      - name: Commit audit JSON
        run: |
          git config user.email "mls-seed@field"
          git config user.name "MLS-Seed-Bot"
          git add outbox/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "MLS schedule seed $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
