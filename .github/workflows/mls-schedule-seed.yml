name: MLS Schedule Seed (stats-api.mlssoccer.com)

on:
  workflow_dispatch:   # Manual trigger — re-seed as needed
  schedule:
    - cron: '0 10 * * 1'  # Weekly Monday 10am UTC — catches schedule changes

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed MLS schedule (Jul 22 – Nov 7) into ARCHIVE_DB
        # No API keys needed — stats-api.mlssoccer.com is auth-free.
        # D1 writes go through relay /d1/execute (X-FIELD-Relay header).
        run: python3 scripts/seed-mls-return-2026.py

      - name: Commit audit JSON
        run: |
          git config user.email "mls-seed@field"
          git config user.name "MLS-Seed-Bot"
          git add outbox/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "MLS schedule seed $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
