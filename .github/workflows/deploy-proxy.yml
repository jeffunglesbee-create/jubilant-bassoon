name: Deploy Proxy Worker

on:
  push:
    branches: [main]
    paths: ['workers/field-claude-proxy/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/field-claude-proxy

      - name: Wait for propagation
        run: sleep 15

      # ══════════════════════════════════════════════════════════════
      # STRUCTURAL CHECKS — verify proxy routing and CORS logic only
      # These tests do NOT require GEMINI_KEY or ANTHROPIC_KEY.
      # They verify the worker code (origin checks, method handling,
      # version headers) without triggering any AI backend calls.
      # ══════════════════════════════════════════════════════════════

      - name: STRUCTURAL 1 — Reject wrong origin
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$PROXY" \
            -H "Content-Type: application/json" \
            -H "Origin: https://evil.example.com" \
            -d '{"messages":[{"role":"user","content":"test"}]}')
          echo "Wrong origin response: $STATUS"
          [ "$STATUS" = "403" ] || { echo "❌ Expected 403, got $STATUS"; exit 1; }
          echo "✅ Origin guard OK"

      - name: STRUCTURAL 2 — Reject GET method
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$PROXY")
          echo "GET method response: $STATUS"
          [ "$STATUS" = "405" ] || { echo "❌ Expected 405, got $STATUS"; exit 1; }
          echo "✅ Method guard OK"

      - name: STRUCTURAL 3 — OPTIONS preflight (workers.dev origin)
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          ORIGIN="https://jubilant-bassoon.jeffunglesbee.workers.dev"
          RESPONSE=$(curl -sI -X OPTIONS "$PROXY" \
            -H "Origin: $ORIGIN" \
            -H "Access-Control-Request-Method: POST")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -qi "access-control-allow-origin" || \
            { echo "❌ CORS header missing on OPTIONS"; exit 1; }
          echo "$RESPONSE" | grep -qi "204" || \
            { echo "❌ Expected 204, got non-204 status"; exit 1; }
          echo "✅ OPTIONS preflight (workers.dev) OK"

      - name: STRUCTURAL 4 — OPTIONS preflight (pages.dev origin)
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          ORIGIN="https://jubilant-bassoon.pages.dev"
          RESPONSE=$(curl -sI -X OPTIONS "$PROXY" \
            -H "Origin: $ORIGIN" \
            -H "Access-Control-Request-Method: POST")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -qi "access-control-allow-origin" || \
            { echo "❌ CORS header missing for pages.dev origin"; exit 1; }
          echo "✅ OPTIONS preflight (pages.dev) OK"

      - name: STRUCTURAL 5 — Version header present
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          # POST with correct origin but no key — expect 500 with version header
          # (no secrets in CI — this verifies routing, not AI backend)
          HEADERS=$(curl -sI -X POST "$PROXY" \
            -H "Content-Type: application/json" \
            -H "Origin: https://jubilant-bassoon.jeffunglesbee.workers.dev" \
            -d '{"messages":[{"role":"user","content":"test"}]}')
          echo "$HEADERS"
          VERSION=$(echo "$HEADERS" | grep -i "x-field-proxy-version" | tr -d '\r' | awk '{print $2}')
          echo "Proxy version: $VERSION"
          [ -n "$VERSION" ] || { echo "❌ X-FIELD-Proxy-Version header missing"; exit 1; }
          echo "✅ Version header present: v$VERSION"

      - name: STRUCTURAL 6 — OPTIONS rejects wrong origin
        run: |
          PROXY="https://field-claude-proxy.jeffunglesbee.workers.dev"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X OPTIONS "$PROXY" \
            -H "Origin: https://attacker.example.com" \
            -H "Access-Control-Request-Method: POST")
          echo "Wrong origin OPTIONS: $STATUS"
          [ "$STATUS" = "403" ] || { echo "❌ Expected 403, got $STATUS"; exit 1; }
          echo "✅ OPTIONS origin guard OK"

      - name: Summary
        run: |
          echo ""
          echo "══════════════════════════════════════════"
          echo "  Proxy Deploy Complete"
          echo "  field-claude-proxy.jeffunglesbee.workers.dev"
          echo ""
          echo "  Structural checks (hard): 6"
          echo "    Origin guard · Method guard · OPTIONS CORS (both origins)"
          echo "    Version header · OPTIONS origin guard"
          echo ""
          echo "  Model: gemini-2.5-flash-lite (30 RPM / 1500 RPD)"
          echo "  Fallback: Claude Sonnet 4 (if ANTHROPIC_KEY set)"
          echo ""
          echo "  Secrets persist in Worker — not affected by deploy:"
          echo "    GEMINI_KEY · ANTHROPIC_KEY"
          echo "══════════════════════════════════════════"
