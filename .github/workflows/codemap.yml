name: Code Map (L3)
on:
  push:
    branches: [main]
    paths:
      - index.html
      - smoke.js
      - STANDARDS.md
      - generate-codemap.js
      - .github/workflows/codemap.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  codemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Generate code map
        run: node generate-codemap.js index.html > CODE_MAP.json
      - name: Validate JSON
        run: node -e "JSON.parse(require('fs').readFileSync('CODE_MAP.json','utf8'))"
      - name: Commit if changed
        run: |
          if git diff --quiet -- CODE_MAP.json; then
            echo "CODE_MAP.json unchanged"
            exit 0
          fi
          git config user.email "claude@field.dev"
          git config user.name  "FIELD CI"
          git add CODE_MAP.json
          git commit -m "codemap: refresh from ${GITHUB_SHA::7} [skip ci]"
          git push
