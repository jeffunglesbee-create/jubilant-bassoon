name: Skim Probe + Auto-fix
# Measures #the-skim populated height at 3 viewports, then:
#   1. Reads recommendation from skim-probe output
#   2. Applies min-height + contain:layout to .skim-strip in index.html
#   3. Commits the CSS fix
#   4. Triggers cls-probe.yml to verify CLS improvement
#
# Fully automated — no manual steps after dispatch.
# If skim has no content today (height=0), records the result and exits
# without patching (re-run on an active day).

on:
  push:
    paths: ['outbox/.trigger-skim-probe']
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  skim-probe:
    runs-on: ubuntu-latest
    name: Skim height probe + CSS auto-fix + CLS re-measure

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run skim height probe
        run: node skim_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Apply CSS fix
        id: apply-fix
        run: |
          OUTPUT=$(python3 apply_skim_fix.py 2>/dev/null)
          echo "$OUTPUT"
          MIN_HEIGHT=$(echo "$OUTPUT" | grep '^MIN_HEIGHT=' | cut -d= -f2)
          PATCHED=$(echo "$OUTPUT" | grep '^PATCHED=' | cut -d= -f2)
          echo "min_height=$MIN_HEIGHT" >> $GITHUB_OUTPUT
          echo "patched=$PATCHED" >> $GITHUB_OUTPUT

      - name: Run smoke gate
        if: steps.apply-fix.outputs.patched == 'true'
        run: node smoke.js 2>&1 | tail -5

      - name: Commit probe result + CSS fix
        run: |
          git config user.email "probe@field"
          git config user.name "Skim Probe"
          git add outbox/skim-probe-*.json

          PATCHED="${{ steps.apply-fix.outputs.patched }}"
          MIN_HEIGHT="${{ steps.apply-fix.outputs.min_height }}"

          if [ "$PATCHED" = "true" ]; then
            git add index.html
            MSG="fix: PM-26-T .skim-strip min-height:${MIN_HEIGHT}px — eliminate t=891ms CLS event [skip ci]"
          else
            MSG="skim-probe result (no content or already patched) [skip ci]"
          fi

          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "$MSG"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done

      - name: Trigger cls-probe for CLS re-measurement
        if: steps.apply-fix.outputs.patched == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/cls-probe.yml/dispatches" \
            -d '{"ref":"main"}' && echo "cls-probe dispatched"
