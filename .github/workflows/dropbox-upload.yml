name: Upload to Dropbox
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Destination filename in Dropbox'
        required: true
        default: 'index_gemini.html'
      source_file:
        description: 'Source file in repo to upload'
        required: true
        default: 'index.html'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Refresh Dropbox access token
        id: refresh
        env:
          # Durable OAuth: a refresh token never expires (unless revoked).
          # The workflow exchanges it for a short-lived access token at runtime,
          # so uploads no longer break every 4 hours like a raw DROPBOX_TOKEN did.
          REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          LEGACY_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: |
          set +e
          # If the refresh-token secrets are present, use the durable OAuth flow.
          if [ -n "$REFRESH_TOKEN" ] && [ -n "$APP_KEY" ] && [ -n "$APP_SECRET" ]; then
            echo "Using refresh-token flow..."
            RESP=$(curl -s -X POST https://api.dropbox.com/oauth2/token \
              -d grant_type=refresh_token \
              -d refresh_token="$REFRESH_TOKEN" \
              -u "$APP_KEY:$APP_SECRET")
            ACCESS=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
            if [ -z "$ACCESS" ]; then
              echo "Failed to refresh token. Response: $RESP"
              exit 1
            fi
            echo "::add-mask::$ACCESS"
            echo "access_token=$ACCESS" >> $GITHUB_OUTPUT
            echo "Refreshed access token OK."
          elif [ -n "$LEGACY_TOKEN" ]; then
            echo "WARNING: falling back to legacy DROPBOX_TOKEN (expires ~4h)."
            echo "::add-mask::$LEGACY_TOKEN"
            echo "access_token=$LEGACY_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "No Dropbox credentials configured. Add DROPBOX_REFRESH_TOKEN + DROPBOX_APP_KEY + DROPBOX_APP_SECRET."
            exit 1
          fi

      - name: Upload to Dropbox
        env:
          ACCESS_TOKEN: ${{ steps.refresh.outputs.access_token }}
        run: |
          echo "Uploading ${{ inputs.source_file }} to Dropbox as /${{ inputs.filename }}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${ACCESS_TOKEN}" \
            --header "Dropbox-API-Arg: {\"path\":\"/${{ inputs.filename }}\",\"mode\":\"overwrite\",\"autorename\":false,\"mute\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @${{ inputs.source_file }})
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed"
            exit 1
          fi
          echo "Upload successful!"
          echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print('Path:', d.get('path_display')); print('Size:', d.get('size'), 'bytes'); print('Modified:', d.get('server_modified'))"
