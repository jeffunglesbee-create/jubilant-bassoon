name: POST Probe
on:
  push:
    paths: ['outbox/.trigger-post-probe']
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: POST request
        run: |
          set +e
          URL=$(grep '^url=' outbox/.trigger-post-probe | cut -d= -f2-)
          BODY_FILE=outbox/.post-probe-body.json
          HDR_FILE=outbox/.post-probe-headers
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/post-result-${TS}.txt"
          echo "URL: $URL  [$TS]" > "$OUT"
          echo "=== Request body ===" >> "$OUT"
          cat "$BODY_FILE" >> "$OUT"
          echo "" >> "$OUT"
          # Build header args
          HDR_ARGS=""
          if [ -f "$HDR_FILE" ]; then
            while IFS= read -r hdr; do
              [ -z "$hdr" ] && continue
              HDR_ARGS="$HDR_ARGS -H \"$hdr\""
            done < "$HDR_FILE"
          fi
          echo "=== Custom headers ===" >> "$OUT"
          [ -f "$HDR_FILE" ] && cat "$HDR_FILE" >> "$OUT" || echo "(none)" >> "$OUT"
          echo "" >> "$OUT"
          echo "=== Response (status + body, first 4000 chars) ===" >> "$OUT"
          eval "curl -s -w '\\nHTTP_STATUS:%{http_code}\\n' -X POST \"\$URL\" -H 'Content-Type: application/json' -H 'Origin: https://jubilant-bassoon.jeffunglesbee.workers.dev' $HDR_ARGS --data-binary @\"\$BODY_FILE\" 2>&1 | head -c 4000 >> \"\$OUT\""
          echo "OUT=$OUT" >> $GITHUB_ENV
      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add "$OUT"
          git commit -m "post-probe $OUT [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
