name: MLB Weekly Stats Update

on:
  schedule:
    # Every Monday 6am ET (11am UTC) — after Sunday night games, Savant data stable
    - cron: '0 11 * * 1'
  workflow_dispatch:  # Manual trigger any time

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Savant CSVs and process into JSON
        run: python3 scripts/mlb-weekly-update.py

      - name: Commit updated tables
        run: |
          git config user.email "mlb-stats@field"
          git config user.name "MLB-Stats-Bot"
          git add outbox/mlb/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "MLB weekly update $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
