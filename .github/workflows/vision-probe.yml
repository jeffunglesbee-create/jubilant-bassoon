name: Vision Probe
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run vision probe
        env:
          VISION_KEY: ${{ secrets.GEMINI_KEY }}
        run: python3 scripts/vision_probe.py
      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "vision-probe"
          git add outbox/vision-probe/
          git commit -m "vision-probe: results [skip ci]"
          git push
