# .github/workflows/desktop-chrome-audit.yml
# Desktop Chrome viewport audit — runs tests/desktop-chrome-viewport.js at
# D1 (1366x768) and D3 (1920x1080) against the deployed Worker. Pairs with
# the Playwright deploy-gate suite for cross-engine coverage of A612.
name: Desktop Chrome Viewport Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'HANDOFF.md'
      - 'outbox/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

jobs:
  desktop-chrome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        device:
          - id: D1
            label: "Laptop ESSENTIALS"
          - id: D3
            label: "Desktop ESSENTIALS"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install chromedriver (Chrome pre-installed on ubuntu-latest)
        run: |
          # google-chrome-stable is pre-installed on GitHub-hosted ubuntu runners.
          # We do NOT apt-install it (would attempt to upgrade Chrome and pull
          # the chrome-stable apt repo which is not configured on this runner
          # for the matching chromedriver). The npm `chromedriver` package
          # auto-downloads the chromedriver matching the installed Chrome
          # major version at install time. `@wdio/chromedriver-service` is
          # NOT used here — it has been deprecated and removed from npm
          # (404 on registry as of June 2026). The minimal install is
          # webdriverio + chromedriver.
          which google-chrome
          google-chrome --version
          # Install chromedriver matching the installed Chrome's major version.
          # `chromedriver` postinstall script reads CHROMEDRIVER_VERSION env
          # (defaults to LATEST_RELEASE which matches Chrome stable).
          CHROME_MAJOR=$(google-chrome --version | awk '{print $3}' | cut -d. -f1)
          echo "Chrome major: $CHROME_MAJOR"
          DETECT_CHROMEDRIVER_VERSION=true npm install --no-save --silent \
            webdriverio@latest chromedriver@latest
          # Locate the installed chromedriver binary
          CHROMEDRIVER_BIN="$(npx --no-install which chromedriver 2>/dev/null || true)"
          if [ -z "$CHROMEDRIVER_BIN" ]; then
            CHROMEDRIVER_BIN="$(node -e 'console.log(require("chromedriver").path)')"
          fi
          echo "chromedriver: $CHROMEDRIVER_BIN"
          "$CHROMEDRIVER_BIN" --version
          echo "CHROMEDRIVER_BIN=$CHROMEDRIVER_BIN" >> "$GITHUB_ENV"

      - name: Start chromedriver
        run: |
          "$CHROMEDRIVER_BIN" --port=9515 > /tmp/chromedriver.log 2>&1 &
          CD_PID=$!
          echo "CHROMEDRIVER_PID=$CD_PID" >> "$GITHUB_ENV"
          # Wait up to 30s for chromedriver to accept connections.
          for i in $(seq 1 30); do
            if ! kill -0 $CD_PID 2>/dev/null; then
              echo "ERROR: chromedriver died"
              tail -50 /tmp/chromedriver.log
              exit 1
            fi
            if curl -s http://localhost:9515/status > /dev/null; then
              echo "chromedriver ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:9515/status || (echo "chromedriver not responding" && exit 1)

      - name: Run viewport assertions
        env:
          DEVICE_ID: ${{ matrix.device.id }}
        run: |
          set -o pipefail
          mkdir -p outbox
          node tests/desktop-chrome-viewport.js \
            2>outbox/desktop-chrome-${{ matrix.device.id }}-stderr.log \
            | tee outbox/desktop-chrome-${{ matrix.device.id }}-results.json

      - name: chromedriver log on failure
        if: failure()
        run: tail -80 /tmp/chromedriver.log

      - name: Shutdown chromedriver
        if: always()
        run: kill "$CHROMEDRIVER_PID" 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-chrome-${{ matrix.device.id }}
          path: outbox/desktop-chrome-${{ matrix.device.id }}-*

  summary:
    needs: desktop-chrome
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Summarize results
        run: |
          echo "# Desktop Chrome Viewport Audit Results"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          for f in results/desktop-chrome-*/desktop-chrome-*-results.json; do
            [ -f "$f" ] || continue
            echo "---"
            DEVICE=$(python3 -c "import json,sys; d=json.load(open('$f')); print(f\"{d.get('deviceId','?')} — {d.get('label','?')}\")" 2>/dev/null || echo "parse error")
            PASSED=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('passed',0))" 2>/dev/null || echo "?")
            TOTAL=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('total',0))" 2>/dev/null || echo "?")
            echo "$DEVICE: $PASSED/$TOTAL passed"
          done
