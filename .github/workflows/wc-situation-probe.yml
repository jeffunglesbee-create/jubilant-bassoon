name: WC V2 Situation Contract Probe
on:
  push:
    paths: ['outbox/.trigger-wc-situation-probe']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe V2 wc26 situation shape
        run: |
          set +e
          RELAY="https://field-relay-nba.jeffunglesbee.workers.dev"
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/wc-situation-result-${TS}.txt"
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          echo "WC V2 Situation Contract Probe — $TS" > "$OUT"
          echo "Goal: enumerate keys present on game.situation for wc26 games" >> "$OUT"
          echo "" >> "$OUT"
          for D in "$TODAY" "$YESTERDAY"; do
            echo "=== date=$D ===" >> "$OUT"
            curl -s "$RELAY/v2/games?sport=wc26&date=$D" > /tmp/wc.json 2>&1
            python3 -c "
          import json
          try:
              d = json.load(open('/tmp/wc.json'))
          except Exception as e:
              print('  parse error:', e)
              raise SystemExit(0)
          games = d if isinstance(d, list) else d.get('games') or d.get('response') or []
          print(f'  games returned: {len(games)}')
          for g in games:
              home = (g.get('home') or {}).get('name', '?')
              away = (g.get('away') or {}).get('name', '?')
              state = g.get('state', '?')
              sit = g.get('situation')
              if sit is None:
                  print(f'  {state:6s} {away} @ {home} :: situation=null')
                  continue
              keys = sorted(sit.keys()) if isinstance(sit, dict) else type(sit).__name__
              print(f'  {state:6s} {away} @ {home} :: situation keys = {keys}')
              # Print raw sit so we see types/values
              print(f'    raw: {json.dumps(sit)[:600]}')
          " >> "$OUT" 2>&1
            echo "" >> "$OUT"
          done
          echo "OUT=$OUT" >> $GITHUB_ENV
      - name: Push result
        run: |
          git config user.email "claude@field.dev"
          git config user.name "FIELD CI"
          git add outbox/
          git commit -m "probe: wc26 situation contract [skip ci]" || exit 0
          git push
