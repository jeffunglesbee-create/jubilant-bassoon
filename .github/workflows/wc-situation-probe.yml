name: WC V2 Situation Contract Probe
on:
  push:
    paths: ['outbox/.trigger-wc-situation-probe']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe V2 wc26 situation shape
        run: |
          set +e
          RELAY="https://field-relay-nba.jeffunglesbee.workers.dev"
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/wc-situation-result-${TS}.txt"
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          echo "WC V2 Situation Contract Probe — $TS" > "$OUT"
          echo "Goal: enumerate keys present on game.situation for wc26 games" >> "$OUT"
          echo "" >> "$OUT"
          for D in "$TODAY" "$YESTERDAY" "2026-06-17" "2026-06-16" "2026-06-15"; do
            echo "=== date=$D ===" >> "$OUT"
            curl -s "$RELAY/v2/games?sport=wc26&date=$D" > /tmp/wc.json 2>&1
            python3 -c "
          import json
          try:
              d = json.load(open('/tmp/wc.json'))
          except Exception as e:
              raw = open('/tmp/wc.json').read()[:400]
              print('  parse error:', e)
              print('  raw:', raw)
              raise SystemExit(0)
          if isinstance(d, dict):
              print('  top-level keys:', sorted(d.keys()))
          games = d if isinstance(d, list) else d.get('games') or d.get('response') or []
          print(f'  games count: {len(games)}')
          if not games and isinstance(d, dict):
              print('  raw (first 600):', json.dumps(d)[:600])
          for g in games[:6]:
              home = (g.get('home') or {}).get('name', '?')
              away = (g.get('away') or {}).get('name', '?')
              state = g.get('state', '?')
              sit = g.get('situation')
              gkeys = sorted(g.keys())
              print(f'  {state:6s} {away} @ {home}')
              print(f'    game top-keys: {gkeys}')
              if sit is None:
                  print(f'    situation=null')
                  continue
              if isinstance(sit, dict):
                  print(f'    situation keys: {sorted(sit.keys())}')
                  print(f'    situation raw: {json.dumps(sit)[:600]}')
              else:
                  print(f'    situation type: {type(sit).__name__} value: {sit}')
          " >> "$OUT" 2>&1
            echo "" >> "$OUT"
          done
          echo "OUT=$OUT" >> $GITHUB_ENV
      - name: Push result
        run: |
          git config user.email "claude@field.dev"
          git config user.name "FIELD CI"
          git add outbox/
          git commit -m "probe: wc26 situation contract [skip ci]" || exit 0
          git push
