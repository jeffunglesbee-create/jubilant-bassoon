name: CORS Probe
on:
  push:
    paths: ['outbox/.trigger-cors-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save
        run: |
          set +e
          URL=$(grep '^url=' outbox/.trigger-cors-probe | cut -d= -f2-)
          LIMIT=$(grep '^limit=' outbox/.trigger-cors-probe | cut -d= -f2-)
          [ -z "$LIMIT" ] && LIMIT=3000
          [ -z "$URL" ] && URL="https://baseballsavant.mlb.com/gf?game_pk=824274"
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cors-result-${TS}.txt"
          echo "URL: $URL  [$TS]" > "$OUT"
          curl -sI "$URL" >> "$OUT" 2>&1 || echo "(HEAD request failed or not supported)" >> "$OUT"
          echo "=== BODY (first ${LIMIT} chars) ===" >> "$OUT"
          curl -s "$URL" | head -c "$LIMIT" >> "$OUT" 2>&1 || echo "(GET request failed)" >> "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add "$OUT"
          git commit -m "probe $OUT [skip ci]"
          # Retry push with rebase — handles concurrent CI pushes to main
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
        env:
          OUT: ${{ env.OUT }}
