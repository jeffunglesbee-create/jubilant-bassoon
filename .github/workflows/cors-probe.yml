name: CORS Probe
on:
  push:
    paths: ['outbox/.trigger-cors-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save
        run: |
          URL=$(grep '^url=' outbox/.trigger-cors-probe | cut -d= -f2-)
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cors-result-${TS}.txt"
          echo "URL: $URL  [$TS]" | tee "$OUT"
          curl -sI "$URL" | tee -a "$OUT"
          echo "=== BODY (first 3000 chars) ===" | tee -a "$OUT"
          curl -s "$URL" | head -c 3000 | tee -a "$OUT"
          echo "OUTFILE=$OUT" >> $GITHUB_ENV

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add "$OUTFILE"
          git commit -m "probe $OUTFILE"
          git push
