name: CORS Probe
on:
  push:
    paths: ['outbox/.trigger-cors-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save
        run: |
          URL=$(grep '^url=' outbox/.trigger-cors-probe | cut -d= -f2-)
          echo "Probing: $URL"
          echo "URL: $URL" > outbox/cors-result.txt
          echo "Date: $(date -u)" >> outbox/cors-result.txt
          echo "=== HEADERS ===" >> outbox/cors-result.txt
          curl -sI "$URL" >> outbox/cors-result.txt
          echo "=== BODY ===" >> outbox/cors-result.txt
          curl -s "$URL" >> outbox/cors-result.txt

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add outbox/cors-result.txt
          git commit -m "probe $(date -u +%H%M%S)" || echo "no change"
          git push || (git pull --rebase && git push)
