name: CORS Probe
on:
  push:
    paths: ['outbox/.trigger-cors-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Multi-target probe
        run: |
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cors-result-${TS}.txt"
          echo "=== FIELD WORKER HEALTH CHECK $TS ===" > "$OUT"

          for TARGET in \
            "https://jubilant-bassoon.jeffunglesbee.workers.dev|FIELD app" \
            "https://field-relay-nba.jeffunglesbee.workers.dev/health|Relay health" \
            "https://field-claude-proxy.jeffunglesbee.workers.dev|Claude proxy"; do
            URL=$(echo $TARGET | cut -d'|' -f1)
            LABEL=$(echo $TARGET | cut -d'|' -f2)
            echo "" >> "$OUT"
            echo "--- $LABEL ---" >> "$OUT"
            echo "URL: $URL" >> "$OUT"
            HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 8 "$URL")
            BODY=$(curl -s --max-time 8 "$URL" | head -c 300)
            echo "HTTP: $HTTP" >> "$OUT"
            echo "Body: $BODY" >> "$OUT"
          done

          echo "" >> "$OUT"
          echo "=== RECENT CI RUNS (last 5 commits) ===" >> "$OUT"
          git log --oneline -10 >> "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV
          cat "$OUT"

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add "$OUT"
          git commit -m "health check $OUT"
          git push
