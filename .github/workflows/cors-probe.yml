name: CORS Probe
on:
  push:
    paths: ['outbox/.trigger-cors-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save
        run: |
          URL=$(grep '^url=' outbox/.trigger-cors-probe | cut -d= -f2-)
          LIMIT=$(grep '^limit=' outbox/.trigger-cors-probe | cut -d= -f2-)
          [ -z "$LIMIT" ] && LIMIT=8000
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="outbox/cors-result-${TS}.txt"
          echo "URL: $URL  [$TS]" > "$OUT"
          curl -sI "$URL" >> "$OUT"
          echo "=== BODY (first ${LIMIT} chars) ===" >> "$OUT"
          curl -s "$URL" | head -c "$LIMIT" >> "$OUT"
          echo "OUT=$OUT" >> $GITHUB_ENV

      - name: Push result
        run: |
          git config user.email "probe@field"
          git config user.name "Probe"
          git add "$OUT"
          git commit -m "probe $OUT"
          git push
