name: Whoop Auth Exchange
on:
  push:
    paths:
      - 'outbox/.trigger-whoop-auth'
  workflow_dispatch:
    inputs:
      authorization_code:
        description: 'Authorization code'
        required: true

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Exchange code
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REDIRECT_URI: ${{ secrets.WHOOP_REDIRECT_URI }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: bash scripts/whoop_exchange.sh "${{ github.event.inputs.authorization_code }}"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outbox/whoop-auth-result.json -f 2>/dev/null
          git commit -m "whoop: auth result [skip ci]" || true
          git push || true
