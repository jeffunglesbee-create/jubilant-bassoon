# .github/workflows/ios-safari-poc.yml
name: iOS Safari POC

on: workflow_dispatch

jobs:
  ios-safari:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: List simulators and boot
        id: boot
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== All available iPhones ==="
          xcrun simctl list devices available | grep "iPhone"
          echo ""
          echo "=== Booting first available iPhone ==="
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for ver, devs in data['devices'].items():
            if 'iOS' not in ver: continue
            for dev in devs:
              if dev['isAvailable'] and 'iPhone' in dev['name']:
                print(dev['udid']); print(dev['name'], file=sys.stderr); sys.exit(0)
          " 2>/tmp/device_name.txt)
          DEVICE_NAME=$(cat /tmp/device_name.txt)
          echo "Booting: $DEVICE_NAME ($UDID)"
          xcrun simctl boot "$UDID" 2>&1 || true
          echo "Waiting 30s for full boot..."
          sleep 30
          echo "=== Boot status ==="
          xcrun simctl list devices | grep "$UDID"
          echo "DEVICE_UDID=$UDID" >> "$GITHUB_ENV"
          echo "DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"

      - name: Open URL and screenshot
        run: |
          echo "=== Opening URL ==="
          # Try multiple approaches
          xcrun simctl openurl "$DEVICE_UDID" "https://jubilant-bassoon.jeffunglesbee.workers.dev/?wpt" 2>&1 || {
            echo "openurl failed, trying alternative..."
            # Alternative: use Safari bundle ID explicitly
            xcrun simctl launch "$DEVICE_UDID" com.apple.mobilesafari "https://jubilant-bassoon.jeffunglesbee.workers.dev/?wpt" 2>&1 || echo "launch also failed"
          }
          echo "Waiting 20s for page load..."
          sleep 20
          echo "=== Taking screenshot ==="
          mkdir -p outbox/ios-poc
          xcrun simctl io "$DEVICE_UDID" screenshot outbox/ios-poc/iphone.png 2>&1 || echo "Screenshot failed"
          ls -la outbox/ios-poc/ 2>/dev/null || echo "No files"

      - name: Check Appium
        run: |
          which safaridriver && safaridriver --version || echo "No safaridriver"
          npm install -g appium 2>&1 | tail -2
          appium driver install safari 2>&1 | tail -3

      - name: Write manifest
        run: |
          mkdir -p outbox/ios-poc
          cat > outbox/ios-poc/manifest.txt << EOF
          device: $DEVICE_NAME
          udid: $DEVICE_UDID
          xcode: $(xcodebuild -version | head -1)
          timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-safari-poc
          path: outbox/ios-poc/
