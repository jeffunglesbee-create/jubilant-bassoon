name: Build EPA Lookup Table

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 1 8 *'   # Aug 1 — before NFL preseason
    - cron: '0 12 1 1 *'   # Jan 1 — after latest BDB data release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install pandas numpy pyarrow --break-system-packages -q

      - name: Build EPA table
        run: python3 scripts/build-epa-table.py

      - name: Run EPA tests
        run: node src/js/test-epa.js

      - name: Push result
        run: |
          git config user.email "epa-build@field"
          git config user.name "EPA-Build"
          git add outbox/nfl/epa_table.json
          git diff --cached --quiet && echo "Table unchanged" && exit 0
          git commit -m "Rebuild EPA table [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
