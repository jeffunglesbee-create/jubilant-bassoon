name: Deploy Betfair Relay

on:
  push:
    paths:
      - 'workers/field-betfair-relay/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy field-betfair-relay
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers/field-betfair-relay
          command: deploy
