# .github/workflows/deploy-gate.yml
#
# FAST-PATH CI-GATED DEPLOY — ~24 seconds total
#
# HOW IT WORKS:
#   1. Triggers ONLY on pushes that change code files (index.html, sw.js, field_utils.js)
#   2. Runs smoke.js only (~5s) — the structural gate, not the full test suite
#   3. On pass → wrangler deploys immediately (~19s)
#   4. On fail → no deploy. Broken code never reaches production.
#
# WHY NOT deploy-after-ci.yml (workflow_run):
#   That waits for full smoke-and-verify.yml (~4 min). Slower is never acceptable.
#   smoke.js alone is sufficient to prove index.html is structurally valid.
#   The pre-commit hook already ran both smoke files before this push arrived.
#
# [skip ci] BEHAVIOUR:
#   [skip ci] in commit message skips ALL GitHub Actions including this workflow.
#   → No deploy. Code waits on main until next normal code push.
#   → Governance gap closed for [skip ci] on index.html.
#
# DATA-ONLY PUSHES:
#   outbox/, scripts/sport-meta.json, STANDARDS.md, GOVERNANCE.json etc.
#   are NOT in the paths list → this workflow never fires for data commits.
#
# REQUIRES: CLOUDFLARE_API_TOKEN secret in this repo's Actions secrets (set May 23 2026).

name: Deploy gate (fast smoke)

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'field_utils.js'
      - 'wrangler.jsonc'

concurrency:
  group: deploy-gate-main
  # Deliberately false: this must QUEUE runs so each one still fully
  # completes (smoke tests, deploy) rather than CANCEL an in-progress
  # run when a new one starts, which could abort a legitimate in-flight
  # deploy. Queueing means a later run's checkout will correctly see
  # the previous run's completed SW_VERSION sync-back commit before
  # computing its own, eliminating the stale-read race
  # (CC-CMD-2026-07-04-deploy-gate-sw-sync-race).
  cancel-in-progress: false

permissions:
  contents: write  # write needed to commit SW_VERSION sync back to repo

jobs:
  smoke-and-deploy:
    name: Smoke (~5s) → Deploy (~19s)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync SW_VERSION to deploy date
        run: |
          # PM-9 (June 1 2026): use America/New_York (Eastern Time) instead
          # of UTC. The deploy gate runs whenever a commit pushes; if that
          # happens after midnight UTC but before midnight ET, the previous
          # behavior stamped the NEXT calendar day onto SW_VERSION while the
          # user (and product surfaces) were still on the PREVIOUS calendar
          # day. Result: Health Panel showed "2026-06-02" at 10pm ET on
          # June 1. ET tracks the product's local day.
          DEPLOY_DATE=$(TZ='America/New_York' date +%Y-%m-%d)
          # Defense in depth beyond the concurrency group above: a long-
          # running earlier job could still finish between THIS job's
          # checkout and this specific step, so refresh to actual current
          # main immediately before reading sw.js's suffix, rather than
          # relying on the workflow-start-time checkout (CC-CMD-2026-07-04-
          # deploy-gate-sw-sync-race). `|| true` -- a pull failure here must
          # not fail the whole sync step; the existing logic still runs
          # against whatever checkout is present, same as today's behavior.
          git pull --rebase --autostash origin main 2>/dev/null || true
          CURRENT=$(grep "^const SW_VERSION" sw.js | grep -o "'[^']*'" | tr -d "'")
          SUFFIX=$(echo "$CURRENT" | grep -o '[a-z]$' || echo "a")
          NEW_VERSION="${DEPLOY_DATE}${SUFFIX}"
          sed -i "s/const SW_VERSION *= *'[^']*'/const SW_VERSION = '${NEW_VERSION}'/" sw.js
          # Also sync index.html so A190 (sw.js === index.html) passes
          sed -i "s/const SW_VERSION = '[^']*'/const SW_VERSION = '${NEW_VERSION}'/" src/legacy/field.js
          node scripts/sync-source.mjs
          echo "✅ SW_VERSION synced to ${NEW_VERSION} in sw.js + src/legacy/field.js → index.html (ET)"

      - name: Commit SW_VERSION sync back to repo
        run: |
          # A190 root-cause fix (June 23 2026):
          # Direct API commits to index.html bypass this workflow's sed sync,
          # leaving sw.js SW_VERSION stale in git. This step commits the sync
          # back so smoke-and-verify.yml always sees consistent files.
          # [skip ci] prevents a deploy loop.
          git config user.email "deploy-gate@field"
          git config user.name "Deploy-Gate"
          git diff --quiet sw.js src/legacy/field.js index.html && echo "SW_VERSION already in sync — no commit needed" && exit 0
          git add sw.js src/legacy/field.js index.html
          git commit -m "chore: sync SW_VERSION $(TZ='America/New_York' date +%Y-%m-%d) — A190 auto-fix [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 3))
          done
          echo "✅ SW_VERSION sync committed back to repo"

      - name: Fast smoke (smoke.js only)
        run: |
          echo "Running smoke.js structural assertions..."
          node smoke.js index.html
          echo "✅ Smoke passed against source — building bundle"

      - name: Build esbuild bundle
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install --ignore-scripts
          node scripts/build-bundle.mjs
          echo "✅ Bundle built — running strip-comments on bundled output"

      - name: Strip comments for deploy
        run: |
          echo "── Source: $(wc -c < index.html | xargs) bytes (git — full comments)"
          node scripts/strip-comments.js index.html
          mv index.deploy.html index.html
          echo "── Deploy: $(wc -c < index.html | xargs) bytes (stripped for users)"
          echo "✅ Comments live in git source — stripped artifact ready for Cloudflare"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b57e9af57ab46c52ca9215804e689c29
          wranglerVersion: "3.109.0"
          # gitHubToken removed: CF GitHub integration disconnected May 23 2026

      - name: Confirm
        run: |
          echo "✅ Deployed ${{ github.sha }}"
          echo "   Full CI (viewport + browser tests) running asynchronously in smoke-and-verify.yml"
