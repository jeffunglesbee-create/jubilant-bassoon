name: Whoop Auto Auth
on:
  workflow_dispatch:

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install playwright requests pynacl -q
          python3 -m playwright install chromium

      - name: Automated OAuth flow
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REDIRECT_URI: ${{ secrets.WHOOP_REDIRECT_URI }}
          WHOOP_EMAIL: ${{ secrets.WHOOP_EMAIL }}
          WHOOP_PASSWORD: ${{ secrets.WHOOP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, time, requests
          from urllib.parse import urlencode, urlparse, parse_qs
          from playwright.sync_api import sync_playwright
          from nacl import encoding, public

          client_id = os.environ["WHOOP_CLIENT_ID"]
          client_secret = os.environ["WHOOP_CLIENT_SECRET"]
          redirect_uri = os.environ["WHOOP_REDIRECT_URI"]
          email = os.environ["WHOOP_EMAIL"]
          password = os.environ["WHOOP_PASSWORD"]
          pat = "${{ secrets.GITHUB_TOKEN }}"
          repo = "${{ github.repository }}"

          os.makedirs("outbox", exist_ok=True)
          result = {}

          # Build OAuth URL
          auth_url = "https://api.prod.whoop.com/oauth/oauth2/auth?" + urlencode({
              "response_type": "code",
              "client_id": client_id,
              "redirect_uri": redirect_uri,
              "scope": "read:recovery read:cycles read:sleep read:workout read:profile read:body_measurement offline",
              "state": "auto_auth"
          })

          print(f"Auth URL: {auth_url[:80]}...")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1"
              )
              page = context.new_page()

              try:
                  print("Loading auth page...")
                  page.goto(auth_url, wait_until="networkidle", timeout=30000)
                  time.sleep(2)

                  # Screenshot for debugging
                  page.screenshot(path="outbox/whoop-auth-1.png")
                  print(f"Page title: {page.title()}")
                  print(f"Page URL: {page.url[:100]}")

                  # Look for email/username field
                  email_sel = page.query_selector('input[type="email"], input[name="email"], input[name="username"], input[id="email"], input[id="username"]')
                  if email_sel:
                      print("Found email field, filling...")
                      email_sel.fill(email)
                  else:
                      # Try broader selector
                      inputs = page.query_selector_all('input[type="text"], input[type="email"]')
                      print(f"Found {len(inputs)} text/email inputs")
                      if inputs:
                          inputs[0].fill(email)

                  # Look for password field
                  pass_sel = page.query_selector('input[type="password"], input[name="password"]')
                  if pass_sel:
                      print("Found password field, filling...")
                      pass_sel.fill(password)

                  time.sleep(1)
                  page.screenshot(path="outbox/whoop-auth-2.png")

                  # Look for submit button
                  submit = page.query_selector('button[type="submit"], input[type="submit"], button:has-text("Log In"), button:has-text("Sign In"), button:has-text("Continue")')
                  if submit:
                      print("Clicking submit...")
                      submit.click()
                      time.sleep(5)
                  else:
                      # Try pressing Enter
                      print("No submit button found, pressing Enter...")
                      page.keyboard.press("Enter")
                      time.sleep(5)

                  page.screenshot(path="outbox/whoop-auth-3.png")
                  print(f"After login URL: {page.url[:150]}")

                  # Check for authorize/consent button
                  auth_btn = page.query_selector('button:has-text("Authorize"), button:has-text("Allow"), button:has-text("Accept"), button:has-text("Grant")')
                  if auth_btn:
                      print("Found authorize button, clicking...")
                      auth_btn.click()
                      time.sleep(5)
                      page.screenshot(path="outbox/whoop-auth-4.png")

                  final_url = page.url
                  print(f"Final URL: {final_url[:200]}")

                  # Extract code from URL
                  parsed = urlparse(final_url)
                  params = parse_qs(parsed.query)
                  code = params.get("code", [None])[0]

                  if code:
                      print(f"Got authorization code: {code[:20]}...")
                      result["code_obtained"] = True

                      # Exchange code for tokens
                      print("Exchanging code for tokens...")
                      r = requests.post("https://api.prod.whoop.com/oauth/token", data={
                          "grant_type": "authorization_code",
                          "code": code,
                          "client_id": client_id,
                          "client_secret": client_secret,
                          "redirect_uri": redirect_uri
                      })

                      print(f"Token exchange: HTTP {r.status_code}")
                      if r.status_code == 200:
                          tokens = r.json()
                          access_token = tokens.get("access_token", "")
                          refresh_token = tokens.get("refresh_token", "")

                          # Store tokens as secrets
                          headers_gh = {"Authorization": f"token {pat}", "Accept": "application/vnd.github+json"}
                          pk_r = requests.get(f"https://api.github.com/repos/{repo}/actions/secrets/public-key", headers=headers_gh)
                          pk_data = pk_r.json()
                          pub_key = public.PublicKey(pk_data["key"].encode("utf-8"), encoding.Base64Encoder)
                          sealed = public.SealedBox(pub_key)

                          for name, val in [("WHOOP_REFRESH_TOKEN", refresh_token), ("WHOOP_ACCESS_TOKEN", access_token)]:
                              enc = base64.b64encode(sealed.encrypt(val.encode())).decode()
                              requests.put(
                                  f"https://api.github.com/repos/{repo}/actions/secrets/{name}",
                                  headers=headers_gh,
                                  json={"encrypted_value": enc, "key_id": pk_data["key_id"]}
                              )

                          result["status"] = "success"
                          result["has_refresh"] = bool(refresh_token)
                          result["expires_in"] = tokens.get("expires_in")
                          print("SUCCESS: Tokens stored as GitHub secrets")
                      else:
                          result["token_error"] = r.text[:500]
                  else:
                      result["status"] = "no_code"
                      result["final_url"] = final_url[:300]
                      # Save page content for debugging
                      result["page_text"] = page.inner_text("body")[:1000]

              except Exception as e:
                  result["error"] = str(e)
                  print(f"Error: {e}")
                  try:
                      page.screenshot(path="outbox/whoop-auth-error.png")
                  except:
                      pass

              browser.close()

          with open("outbox/whoop-auth-result.json", "w") as f:
              json.dump(result, f, indent=2)
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outbox/whoop-auth-result.json outbox/whoop-auth-*.png -f 2>/dev/null
          git commit -m "whoop: auto-auth result [skip ci]" || echo "Nothing to commit"
          git push || true
