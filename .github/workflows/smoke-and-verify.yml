name: Smoke Test + Live Verify
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'   # 6am ET daily — compliance report

jobs:
  smoke:
    runs-on: ubuntu-latest
    name: Smoke test + live verification
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run smoke test against index.html
        run: |
          # smoke.js is the single shared smoke test (CI + local both run it)
          # Adding assertions: update smoke.js + FIELD_FEATURES in index.html
          node smoke.js index.html

      - name: Run unit tests
        run: |
          # field_unit.js tests pure functions with known input/output contracts
          # Rule 17: add tests when a function's contract is defined or bug is fixed
          node field_unit.js

      - name: Wait for Cloudflare propagation
        run: |
          echo "Waiting 25s for Cloudflare to deploy..."
          sleep 25

      - name: CHECK — Live URL responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://jubilant-bassoon.jeffunglesbee.workers.dev/)
          echo "Live URL status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Live URL returned $STATUS"; exit 1; }
          echo "✅ Live URL OK"

      - name: CHECK — index.html served (not redirect)
        run: |
          BODY=$(curl -s https://jubilant-bassoon.jeffunglesbee.workers.dev/)
          echo "$BODY" | grep -q '<title>FIELD' || { echo "❌ FIELD title not in response"; exit 1; }
          echo "✅ FIELD app served correctly"

      - name: CHECK — MLB Stats API reachable from live app context
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=$(date +%Y-%m-%d)&hydrate=team")
          echo "MLB Stats API status: $STATUS"
          [ "$STATUS" = "200" ] || echo "⚠️ MLB Stats API returned $STATUS (non-blocking)"
          echo "✅ MLB API check done"

      - name: CHECK — RELAY health (if Worker live)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://field-relay-nba.jeffunglesbee.workers.dev/health 2>/dev/null || echo "000")
          BODY=$(curl -s https://field-relay-nba.jeffunglesbee.workers.dev/health 2>/dev/null || echo "unreachable")
          echo "RELAY status: $STATUS | body: $BODY"
          if [ "$BODY" = "RELAY OK" ]; then
            echo "✅ RELAY healthy"
          else
            echo "ℹ️ RELAY not responding — parallel validation not yet active"
          fi

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════"
          echo "  FIELD Smoke + Verify Complete"
          echo "  $(date '+%Y-%m-%d %H:%M UTC')"
          echo "════════════════════════════════════"

  viewport-smoke:
    runs-on: ubuntu-latest
    name: Viewport geometric invariant tests (Layer 1)
    needs: smoke           # runs after static smoke, before live browser test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run viewport geometric invariant tests
        run: |
          # Tests run against local index.html (no live URL needed)
          # Catches layout bugs BEFORE they deploy to Cloudflare
          # Layer 1: bounding box contracts at 360/393/820/1200px
          # Every assertion traces to a real regression found during development
          npx playwright test viewport_smoke.js \
            --config playwright.viewport.config.js \
            --reporter=list
        # Start non-blocking (continue-on-error) to establish clean baseline.
        # Remove continue-on-error once first green run is confirmed.
        continue-on-error: true

      - name: AI Screenshot Review (Layer 2)
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Reads viewport-screenshots/vp-{360,393,820,1200}.png (from A99/B99/C99/D99 tests)
          # Sends each to Claude Vision via Anthropic API
          # Qualitative review: "overlaid and sloppy?" — catches what bounding-box tests cannot
          # Non-blocking (exit 0) until clean CI baseline is confirmed
          # Requires: ANTHROPIC_API_KEY GitHub secret
          node layer2_review.js

      - name: Upload viewport screenshots + Layer 2 raw material
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viewport-screenshots-${{ github.sha }}
          path: |
            viewport-screenshots/
            viewport-test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  Viewport Smoke (Layer 1) complete"
          echo "  Screenshots uploaded as CI artifacts"
          echo "  Layer 2 (AI qualitative review): not yet built"
          echo "  $(date '+%Y-%m-%d %H:%M UTC')"
          echo "════════════════════════════════════════════"

  browser-test:
    runs-on: ubuntu-latest
    name: Browser runtime tests (Playwright)
    needs: viewport-smoke    # viewport geometry must pass before live browser test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Wait for Cloudflare propagation
        run: |
          echo "Waiting 30s for Cloudflare to propagate after smoke deploy..."
          sleep 30

      - name: Run browser tests against live URL
        run: |
          # Layer 3: behavioral verification of live deployment
          # GROUP 1 (Structural): always blocks — F01-F11
          # GROUP 2 (Data-dependent): skips gracefully when no games — F12-F15
          # Hard-fail: CI blocks if structural tests fail.
          npx playwright test field_browser.test.js --reporter=list
        # continue-on-error removed — Layer 3 is now blocking
        # Baseline established: F01-F11 are data-independent and always pass

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            /tmp/field_browser_results.json
            test-results/
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  Browser tests complete"
          echo "  $(date '+%Y-%m-%d %H:%M UTC')"
          echo "  Live URL: https://jubilant-bassoon.jeffunglesbee.workers.dev"
          echo "════════════════════════════════════════"

  compliance-report:
    runs-on: ubuntu-latest
    name: Daily compliance check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run compliance audit
        run: |
          node << 'EOF'
          const fs   = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const today = new Date();
          let issues = [], warnings = [], ok = [];

          // ── 1. Bundle key integrity ──────────────────────────────────────
          const srSection = html.match(/const SR\s*=\s*\{([\s\S]*?)\n\};\s*\n/);
          const bundleSection = html.match(/const BUNDLES\s*=\s*\{([\s\S]*?)\n\};\s*\n/);
          if (srSection && bundleSection) {
            const srKeys = new Set([...srSection[1].matchAll(/^\s{2}(\w+):/gm)].map(m=>m[1]));
            const bundleRefs = [...bundleSection[1].matchAll(/"(\w+)"/g)].map(m=>m[1]);
            const missing = bundleRefs.filter(k => !srKeys.has(k) && k !== k.toUpperCase());
            if (missing.length) {
              missing.forEach(k => issues.push(`Bundle references undefined SR key: "${k}"`));
            } else {
              ok.push(`Bundle key integrity: all ${bundleRefs.length} refs resolve`);
            }
          }

          // ── 2. Confirmed:true gate ────────────────────────────────────────
          const confirmed = (html.match(/confirmed:true/g)||[]).length;
          const unconfirmed = (html.match(/confirmed:false,/g)||[]).length;  // comma-terminated = actual game data, not comments
          if (unconfirmed > 0) issues.push(`${unconfirmed} unconfirmed entries (confirmed:false)`);
          else ok.push(`confirmed:true gate: ${confirmed} entries, 0 unconfirmed`);

          // ── 3. DraftKings false attribution ──────────────────────────────
          const aiEstimated = (html.match(/AI Estimated/g)||[]).length;
          const fakeSource  = (html.match(/"source"\s*:\s*"DraftKings"/g)||[]).length;
          if (fakeSource > 3) issues.push(`Possible DraftKings false attribution: ${fakeSource} instances`);
          else ok.push(`DraftKings attribution: ${aiEstimated} AI Estimated labels, ${fakeSource} live DK labels`);

          // ── 4. GDPR bypass ───────────────────────────────────────────────
          if (html.includes('startsWith("Europe/")') && html.includes('return;')) {
            ok.push('GDPR interim bypass: EU timezone check present before ipapi.co fetch');
          } else {
            issues.push('GDPR bypass NOT FOUND — EU users may be silently geolocated');
          }

          // ── 5. Pricing freshness ─────────────────────────────────────────
          const prices = [...html.matchAll(/\$(\d+\.?\d*)\/mo/g)].map(m => parseFloat(m[1]));
          const highPrices = prices.filter(p => p > 60);
          if (highPrices.length > 0) {
            warnings.push(`${highPrices.length} live TV bundle prices >$60/mo — verify against current provider pages (prices change 2-4x/year)`);
          }
          warnings.push(`${prices.length} hardcoded subscription prices in SR registry — verify quarterly`);

          // ── 6. Rights contracts with known end dates ─────────────────────
          const contractMap = {
            'EPL (NBC/Peacock)': 2028,
            'EFL (CBS Sports)':  2028,
            'NHL (ESPN/TNT)':    2028,
            'NBA (ESPN/NBC/Prime)': 2030,
            'MLB (various)':     2028,
          };
          const thisYear = today.getFullYear();
          Object.entries(contractMap).forEach(([league, expiry]) => {
            const yearsLeft = expiry - thisYear;
            if (yearsLeft <= 1) issues.push(`${league} rights expire ${expiry} — verify renewal status`);
            else if (yearsLeft <= 2) warnings.push(`${league} rights expire ${expiry} (${yearsLeft} years)`);
            else ok.push(`${league} rights: valid through ${expiry}`);
          });

          // ── 7. NBA_TNT deprecated ────────────────────────────────────────
          const nba_tnt = (html.match(/resolveBundle\(['"](NBA_TNT)['"]\)/g)||[]).length;
          if (nba_tnt > 0) issues.push(`NBA_TNT appears in ${nba_tnt} resolveBundle call(s) — deprecated, use NBA_ESPN/ABC/NBC/PRIME`);
          else ok.push('NBA_TNT deprecated bundle: 0 active resolveBundle references');

          // ── 8. AI betting disclaimer present ─────────────────────────────
          if (html.includes('verify before wagering') || html.includes('AI Estimated')) {
            ok.push('Betting disclaimer: AI estimated label + verify warning present');
          } else {
            issues.push('Betting disclaimer MISSING');
          }

          // ── Output summary ───────────────────────────────────────────────
          console.log('\n══ FIELD Daily Compliance Report — ' + today.toDateString() + ' ══\n');
          console.log('🔴 ISSUES (' + issues.length + '):');
          issues.forEach(i => console.log('  ❌ ' + i));
          console.log('\n🟡 WARNINGS (' + warnings.length + '):');
          warnings.forEach(w => console.log('  ⚠️  ' + w));
          console.log('\n✅ PASSING (' + ok.length + '):');
          ok.forEach(o => console.log('  ✅ ' + o));

          if (issues.length > 0) {
            console.log('\n⛔ Compliance issues found — review required.');
            process.exit(1);
          } else {
            console.log('\n✅ No blocking compliance issues.');
          }
          EOF

      - name: Monitor streaming price change news (RSS)
        run: |
          echo "Checking for streaming service price announcements..."
          SERVICES="peacock youtubetv hulu fubo sling espn+ disneyplus max paramount"
          FOUND=0
          for SVC in $SERVICES; do
            # Check Google News RSS — static HTML, curl-accessible
            COUNT=$(curl -sL --max-time 8 \
              "https://news.google.com/rss/search?q=${SVC}+price+increase+OR+price+change&hl=en-US&gl=US&ceid=US:en" \
              2>/dev/null | grep -c "<item>" || echo "0")
            if [ "$COUNT" -gt "3" ]; then
              TITLE=$(curl -sL --max-time 8 \
                "https://news.google.com/rss/search?q=${SVC}+price+increase+OR+price+change&hl=en-US&gl=US&ceid=US:en" \
                2>/dev/null | grep -oP '(?<=<title>)[^<]+' | sed -n '2p')
              echo "⚠️  ${SVC}: ${COUNT} news items — possible price change. Latest: ${TITLE}"
              FOUND=$((FOUND+1))
            else
              echo "✅ ${SVC}: no price change news (${COUNT} items)"
            fi
          done
          if [ "$FOUND" -gt "0" ]; then
            echo ""
            echo "⚠️  $FOUND service(s) have recent price news — verify SR authNote pricing"
          else
            echo ""
            echo "✅ No streaming price change news detected"
          fi

      - name: Check key SR URLs respond
        run: |
          FAIL=0
          for url in \
            "https://www.espn.com/watch/" \
            "https://www.peacocktv.com/sports" \
            "https://www.amazon.com/gp/video/storefront/sports" \
            "https://tv.apple.com/channel/tvs.sbd.4000/sports" \
            "https://www.youtube.com/tv" \
            "https://www.sling.com/" \
            "https://www.hulu.com/live-tv"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 "$url" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "✅ $url ($CODE)"
            else
              echo "⚠️  $url returned $CODE — verify service is still available"
              # Warning only, not a hard fail (CDN may require browser headers)
            fi
          done

      - name: Summary
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  Compliance check complete"
          echo "  $(date '+%Y-%m-%d')"
          echo "════════════════════════════════════════"
