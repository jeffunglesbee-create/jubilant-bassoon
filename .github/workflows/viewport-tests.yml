name: Viewport Tests (Playwright)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'tests/viewport-*.spec.js'
      - 'tests/viewport.playwright.config.js'

jobs:
  viewport-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install webkit chromium --with-deps
      - name: Run viewport tests
        run: npx playwright test tests/viewport-all.spec.js --config=tests/viewport.playwright.config.js
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: viewport-test-results
          path: test-results/
          retention-days: 7
