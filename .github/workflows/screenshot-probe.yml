name: Screenshot Probe
# Takes viewport screenshots of live FIELD site via headless Chromium.
# Commits PNGs to outbox/ [skip ci].
# Trigger: workflow_dispatch OR push to outbox/.trigger-screenshot-probe

on:
  push:
    paths: ['outbox/.trigger-screenshot-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    name: Viewport screenshots (mobile/tablet/desktop)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node screenshot_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        run: |
          git config user.email "probe@field"
          git config user.name "Screenshot Probe"
          git add outbox/screenshot-*.png outbox/screenshot-manifest-*.json outbox/screenshot-manifest-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "screenshot probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
