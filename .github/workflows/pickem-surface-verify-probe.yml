name: Pick 'em Surface Verify Probe
# Live TASK 3 + TASK 4 verification for CC-CMD-2026-07-05-pick-em-reconcile:
# confirms game cards no longer render any pick-em UI, the new pickem-mode
# surface actually activates/deactivates in a real browser, and making a
# pick from the new surface still fires a real pick_made network request.

on:
  push:
    paths: ['outbox/.trigger-pickem-surface-probe']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run pick 'em surface verify probe
        run: node pickem_surface_verify_probe.js
        env:
          FIELD_URL: https://jubilant-bassoon.jeffunglesbee.workers.dev

      - name: Commit results
        if: always()
        run: |
          git config user.email "probe@field"
          git config user.name "Pick 'em Surface Verify Probe"
          git add outbox/pickem-surface-probe-*.txt
          git status --short
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "pickem surface verify probe result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && break
            sleep $((i * 5))
          done
