# DEPRECATED 2026-06-23: FBref lost Opta licence Jan 2026. Replaced by ESPN Core API xG.
# Schedule trigger disabled; workflow_dispatch retained for manual reruns / archival fetches.
name: Soccer FBref Stats Update
on:
  # schedule:
  #   - cron: '0 8 */3 * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright + stealth
        run: |
          pip install playwright playwright-stealth
          playwright install chromium --with-deps
          sudo apt-get install -y xvfb

      - name: Fetch FBref stats via stealth browser + proxy
        env:
          CLOUDFLARE_ACCOUNT_ID: b57e9af57ab46c52ca9215804e689c29
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATAIMPULSE_PROXY: "http://${{ secrets.DATAIMPULSE_USER }}:${{ secrets.DATAIMPULSE_PASS }}@gw.dataimpulse.com:823"
        run: xvfb-run --auto-servernum python3 scripts/soccer-fbref-wc.py
