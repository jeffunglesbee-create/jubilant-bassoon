name: Soccer FBref Stats Update
on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FBref stats via residential proxy
        env:
          CLOUDFLARE_ACCOUNT_ID: b57e9af57ab46c52ca9215804e689c29
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATAIMPULSE_PROXY: "http://${{ secrets.DATAIMPULSE_USER }}:${{ secrets.DATAIMPULSE_PASS }}@gw.dataimpulse.com:823"
        run: python3 scripts/soccer-fbref-wc.py
